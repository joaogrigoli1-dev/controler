<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controler — Dashboard de Desenvolvimento</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg: #0a0e14; --s1: #12171f; --s2: #1a2030; --s3: #222c3c;
      --bd: #2a3545; --tx: #e1e8f0; --dim: #7a8a9e; --muted: #4a5a6e;
      --ac: #3b82f6; --ac2: #60a5fa; --gn: #22c55e; --rd: #ef4444;
      --yw: #eab308; --or: #f97316; --pu: #a855f7; --cy: #06b6d4;
      --radius: 10px; --shadow: 0 1px 3px rgba(0,0,0,.4);
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif;
           background: var(--bg); color: var(--tx); height: 100vh; overflow: hidden;
           display: flex; flex-direction: column; }
    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--bd); border-radius: 3px; }

    /* Layout */
    .shell { display: flex; flex: 1; overflow: hidden; }
    .sidebar { width: 220px; background: var(--s1); border-right: 1px solid var(--bd);
               display: flex; flex-direction: column; flex-shrink: 0; }
    .sidebar-header { padding: 20px 16px 12px; border-bottom: 1px solid var(--bd); }
    .sidebar-header h1 { font-size: 13px; font-weight: 700; letter-spacing: 1.2px;
                         color: var(--ac2); text-transform: uppercase; display: flex;
                         align-items: center; gap: 8px; }
    .sidebar-header .dot { width: 7px; height: 7px; background: var(--gn); border-radius: 50%;
                           animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .sidebar-header .sub { font-size: 10px; color: var(--dim); margin-top: 4px; }
    .nav { flex: 1; padding: 8px 0; overflow-y: auto; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 16px;
                cursor: pointer; font-size: 13px; color: var(--dim); transition: all .15s;
                border-left: 3px solid transparent; }
    .nav-item:hover { background: var(--s2); color: var(--tx); }
    .nav-item.active { background: var(--s2); color: var(--ac2); border-left-color: var(--ac); }
    .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
    .nav-section { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase;
                   letter-spacing: 1px; padding: 16px 16px 6px; }
    .main { flex: 1; overflow-y: auto; padding: 24px 28px; }
    .main-header { margin-bottom: 24px; }
    .main-header h2 { font-size: 22px; font-weight: 700; }
    .main-header p { font-size: 13px; color: var(--dim); margin-top: 4px; }

    /* Cards */
    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; margin-bottom: 24px; }
    .card { background: var(--s1); border: 1px solid var(--bd); border-radius: var(--radius);
            padding: 16px; transition: all .2s; }
    .card:hover { border-color: var(--ac); transform: translateY(-1px); box-shadow: var(--shadow); }
    .card-label { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 6px; }
    .card-value { font-size: 28px; font-weight: 700; }
    .card-sub { font-size: 11px; color: var(--dim); margin-top: 4px; }
    .card-value.blue { color: var(--ac2); }
    .card-value.green { color: var(--gn); }
    .card-value.purple { color: var(--pu); }
    .card-value.orange { color: var(--or); }
    .card-value.cyan { color: var(--cy); }

    /* Tables */
    .table-wrap { background: var(--s1); border: 1px solid var(--bd); border-radius: var(--radius);
                  overflow: hidden; margin-bottom: 24px; }
    .table-header { display: flex; align-items: center; justify-content: space-between;
                    padding: 14px 16px; border-bottom: 1px solid var(--bd); }
    .table-header h3 { font-size: 14px; font-weight: 600; }
    table { width: 100%; border-collapse: collapse; }
    th { font-size: 10px; text-transform: uppercase; letter-spacing: .8px; color: var(--dim);
         text-align: left; padding: 10px 16px; border-bottom: 1px solid var(--bd); font-weight: 600; }
    td { font-size: 13px; padding: 10px 16px; border-bottom: 1px solid rgba(42,53,69,.5); }
    tr:hover td { background: var(--s2); }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px;
             font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
    .badge-decision { background: rgba(59,130,246,.15); color: var(--ac2); }
    .badge-pattern { background: rgba(168,85,247,.15); color: var(--pu); }
    .badge-error { background: rgba(239,68,68,.15); color: var(--rd); }
    .badge-context { background: rgba(6,182,212,.15); color: var(--cy); }
    .badge-person { background: rgba(234,179,8,.15); color: var(--yw); }
    .badge-cleanup { background: rgba(122,138,158,.15); color: var(--dim); }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px;
           border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer;
           border: 1px solid var(--bd); background: var(--s2); color: var(--tx);
           transition: all .15s; }
    .btn:hover { background: var(--s3); border-color: var(--ac); }
    .btn-primary { background: var(--ac); border-color: var(--ac); color: #fff; }
    .btn-primary:hover { background: #2563eb; }
    .btn-sm { padding: 4px 10px; font-size: 11px; }
    .btn-danger { border-color: var(--rd); color: var(--rd); }
    .btn-danger:hover { background: rgba(239,68,68,.1); }

    /* Inputs */
    input, textarea, select { background: var(--s2); border: 1px solid var(--bd); color: var(--tx);
           border-radius: 6px; padding: 8px 12px; font-size: 13px; font-family: inherit;
           width: 100%; transition: border-color .15s; }
    input:focus, textarea:focus, select:focus { outline: none; border-color: var(--ac); }
    textarea { resize: vertical; min-height: 80px; }
    .form-group { margin-bottom: 12px; }
    .form-label { font-size: 11px; color: var(--dim); margin-bottom: 4px; display: block;
                  text-transform: uppercase; letter-spacing: .5px; }

    /* Search */
    .search-bar { position: relative; margin-bottom: 16px; }
    .search-bar input { padding-left: 36px; }
    .search-bar svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
                      width: 14px; height: 14px; color: var(--dim); }

    /* Tabs */
    .tabs { display: flex; gap: 2px; margin-bottom: 20px; background: var(--s1);
            border-radius: 8px; padding: 3px; border: 1px solid var(--bd); width: fit-content; }
    .tab { padding: 6px 16px; border-radius: 6px; font-size: 12px; font-weight: 500;
           cursor: pointer; color: var(--dim); transition: all .15s; }
    .tab:hover { color: var(--tx); }
    .tab.active { background: var(--ac); color: #fff; }

    /* Project card */
    .proj-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .proj-card { background: var(--s1); border: 1px solid var(--bd); border-radius: var(--radius);
                 padding: 18px; cursor: pointer; transition: all .2s; }
    .proj-card:hover { border-color: var(--ac); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.3); }
    .proj-card h4 { font-size: 16px; font-weight: 600; margin-bottom: 8px; display: flex;
                    align-items: center; gap: 8px; }
    .proj-card .meta { font-size: 12px; color: var(--dim); margin-bottom: 10px; }
    .proj-card .type-bar { display: flex; gap: 3px; height: 6px; border-radius: 3px; overflow: hidden; }
    .proj-card .type-bar div { border-radius: 3px; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 100;
                     display: flex; align-items: center; justify-content: center; }
    .modal { background: var(--s1); border: 1px solid var(--bd); border-radius: 12px;
             width: 560px; max-height: 80vh; overflow-y: auto; padding: 24px; }
    .modal h3 { font-size: 18px; font-weight: 600; margin-bottom: 16px; }

    /* Rules editor */
    .rules-editor { background: var(--s2); border: 1px solid var(--bd); border-radius: var(--radius);
                    padding: 16px; font-family: 'SF Mono', 'Menlo', monospace; font-size: 13px;
                    line-height: 1.6; min-height: 300px; white-space: pre-wrap; }

    /* KPI Ring */
    .kpi-ring { display: flex; align-items: center; gap: 12px; }
    .ring-svg { width: 48px; height: 48px; transform: rotate(-90deg); }
    .ring-bg { fill: none; stroke: var(--bd); stroke-width: 4; }
    .ring-fg { fill: none; stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset .5s; }

    /* Chip list */
    .chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px;
            border-radius: 12px; font-size: 11px; background: var(--s3); color: var(--dim); }

    /* Empty state */
    .empty { text-align: center; padding: 40px; color: var(--dim); }
    .empty svg { width: 40px; height: 40px; margin-bottom: 12px; opacity: .5; }
    .empty p { font-size: 13px; }

    /* ── Hardware Dashboard ─────────────────────────────────── */
    .hw-section { background: var(--s1); border: 1px solid var(--bd); border-radius: var(--radius);
                  padding: 18px; margin-bottom: 18px; }
    .hw-section-title { font-size: 12px; font-weight: 700; text-transform: uppercase;
                        letter-spacing: 1px; color: var(--dim); margin-bottom: 14px;
                        display: flex; align-items: center; gap: 8px; }
    .hw-section-title svg { width: 14px; height: 14px; }
    .gauge-bar { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
    .gauge-bar-row { display: flex; align-items: center; gap: 10px; }
    .gauge-bar-label { font-size: 11px; color: var(--dim); width: 90px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .gauge-bar-track { flex: 1; height: 8px; background: var(--s3); border-radius: 4px; overflow: hidden; }
    .gauge-bar-fill  { height: 100%; border-radius: 4px; transition: width .4s ease; }
    .gauge-bar-pct  { font-size: 11px; font-weight: 600; width: 38px; text-align: right; flex-shrink: 0; }
    .gauge-big { display: flex; align-items: center; gap: 16px; }
    .gauge-big-ring { position: relative; flex-shrink: 0; }
    .gauge-big-ring svg { display: block; }
    .gauge-big-ring .pct-label { position: absolute; inset: 0; display: flex; align-items: center;
                                 justify-content: center; font-size: 13px; font-weight: 700; }
    .hw-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .hw-grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
    .hw-stat { display: flex; flex-direction: column; gap: 3px; }
    .hw-stat-label { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: .6px; }
    .hw-stat-value { font-size: 20px; font-weight: 700; }
    .hw-stat-sub   { font-size: 10px; color: var(--dim); }
    .hw-badge-ok   { color: var(--gn); }
    .hw-badge-warn { color: var(--yw); }
    .hw-badge-crit { color: var(--rd); }
    .hw-suggest-row { display: flex; align-items: flex-start; gap: 12px; padding: 10px 0;
                      border-bottom: 1px solid rgba(42,53,69,.5); }
    .hw-suggest-row:last-child { border-bottom: none; }
    .hw-suggest-icon { font-size: 18px; flex-shrink: 0; width: 26px; text-align: center; }
    .hw-suggest-body { flex: 1; }
    .hw-suggest-title { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
    .hw-suggest-desc  { font-size: 11px; color: var(--dim); line-height: 1.5; }
    .hw-suggest-tag   { display: inline-block; padding: 1px 7px; border-radius: 3px; font-size: 9px;
                        font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-left: 8px; }
    .hw-suggest-tag.easy   { background: rgba(34,197,94,.15); color: var(--gn); }
    .hw-suggest-tag.medium { background: rgba(234,179,8,.15);  color: var(--yw); }
    .hw-suggest-tag.hard   { background: rgba(239,68,68,.15);  color: var(--rd); }
    .hw-refresh-btn { margin-left: auto; }
    .hw-ts { font-size: 10px; color: var(--muted); margin-left: auto; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useMemo } = React;
const API = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
  ? `http://${window.location.hostname}:3001/api`
  : `${window.location.origin}/api`;

// ── Icons (inline SVG) ─────────────────────────────────────────────────────
const Icon = {
  Home: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
  Brain: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9.5 2A5.5 5.5 0 005 7.5c0 .8.2 1.6.5 2.3A5.5 5.5 0 003 14.5 5.5 5.5 0 008.5 20H9"/><path d="M14.5 2A5.5 5.5 0 0120 7.5c0 .8-.2 1.6-.5 2.3A5.5 5.5 0 0122 14.5 5.5 5.5 0 0016.5 20H16"/><path d="M12 2v20"/></svg>,
  Shield: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
  Chart: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>,
  Search: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>,
  Plus: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 5v14M5 12h14"/></svg>,
  Trash: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>,
  Folder: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>,
  Edit: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
  X: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6L6 18M6 6l12 12"/></svg>,
  Rocket: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 00-2.91-.09z"/><path d="M12 15l-3-3a22 22 0 012-3.95A12.88 12.88 0 0122 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 01-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/></svg>,
  Refresh: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>,
  Database: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>,
  Server: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>,
  Cpu:    () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></svg>,
  HardDrive: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="22" y1="12" x2="2" y2="12"/><path d="M5.45 5.11L2 12v6a2 2 0 002 2h16a2 2 0 002-2v-6l-3.45-6.89A2 2 0 0016.76 4H7.24a2 2 0 00-1.79 1.11z"/><line x1="6" y1="16" x2="6.01" y2="16"/><line x1="10" y1="16" x2="10.01" y2="16"/></svg>,
  Wifi:   () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 12.55a11 11 0 0114.08 0"/><path d="M1.42 9a16 16 0 0121.16 0"/><path d="M8.53 16.11a6 6 0 016.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>,
  Zap:    () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
  Box:    () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>,
};

// ── API hooks ───────────────────────────────────────────────────────────────
function useFetch(url, deps=[]) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const reload = useCallback(() => {
    setLoading(true);
    fetch(API + url).then(r => r.json()).then(d => { setData(d); setLoading(false); })
      .catch(() => setLoading(false));
  }, [url]);
  useEffect(reload, [...deps, url]);
  return { data, loading, reload };
}

// ── KPI Card ────────────────────────────────────────────────────────────────
function KPICard({ label, value, color='blue', sub }) {
  return (
    <div className="card">
      <div className="card-label">{label}</div>
      <div className={`card-value ${color}`}>{value}</div>
      {sub && <div className="card-sub">{sub}</div>}
    </div>
  );
}

// ── Ring Chart ──────────────────────────────────────────────────────────────
function Ring({ value, max, color='var(--ac)', size=48 }) {
  const r = 18, c = 2 * Math.PI * r;
  const pct = max > 0 ? value / max : 0;
  return (
    <svg className="ring-svg" width={size} height={size} viewBox="0 0 44 44">
      <circle className="ring-bg" cx="22" cy="22" r={r} />
      <circle className="ring-fg" cx="22" cy="22" r={r}
        stroke={color} strokeDasharray={c} strokeDashoffset={c * (1 - pct)} />
    </svg>
  );
}

// ── Type Badge ──────────────────────────────────────────────────────────────
function TypeBadge({ type }) {
  const cls = `badge badge-${type.toLowerCase()}`;
  return <span className={cls}>{type}</span>;
}

// ── Overview Page ───────────────────────────────────────────────────────────
function Overview({ onNavigate }) {
  const { data, loading } = useFetch('/overview');
  const { data: kpis } = useFetch('/kpis');
  if (loading || !data) return <div className="empty"><p>Carregando...</p></div>;

  const typeColors = { DECISION:'var(--ac2)', PATTERN:'var(--pu)', ERROR:'var(--rd)',
                       CONTEXT:'var(--cy)', PERSON:'var(--yw)', CLEANUP:'var(--dim)' };
  const rulesCoverage = data.projects.filter(p => p.hasRules).length;
  const avgMemories = data.projects.length > 0 ? Math.round(data.totalMemories / data.projects.length) : 0;
  const g = kpis?.global;

  return (
    <div>
      <div className="main-header">
        <h2>Dashboard</h2>
        <p>Visão geral de todos os projetos em ~/Documents/DEV/</p>
      </div>

      <div className="cards" style={{gridTemplateColumns:'repeat(auto-fill, minmax(180px, 1fr))'}}>
        <KPICard label="Projetos Ativos" value={data.projects.length} color="blue" sub="Detectados automaticamente" />
        <KPICard label="Memórias Totais" value={data.totalMemories} color="purple" sub={`Média ${avgMemories}/projeto`} />
        <KPICard label="Cobertura de Regras" value={`${rulesCoverage}/${data.projects.length}`} color="green"
                 sub={rulesCoverage === data.projects.length ? 'Todos cobertos' : 'Projetos sem regras'} />
        {g && <KPICard label="Commits (7 dias)" value={g.totalCommits7d} color="green" sub={`${g.totalCommits30d} no mês`} />}
        <KPICard label="Última Atividade" value={data.lastGlobalActivity ? new Date(data.lastGlobalActivity).toLocaleDateString('pt-BR') : '—'}

              <td>{(() => {
                const all = {};
                data.projects.forEach(p => Object.entries(p.byType||{}).forEach(([t,c]) => all[t]=(all[t]||0)+c));
                const sorted = Object.entries(all).sort((a,b)=>b[1]-a[1]);
                return sorted[0] ? `${sorted[0][0]} (${sorted[0][1]})` : '—';

  );
}

// ── Memories Page ────────────────────────────────────────────────────────────
function Memories({ selectedProject }) {
  const [project, setProject] = useState(selectedProject || '');
  const [search, setSearch] = useState('');
  const [showAdd, setShowAdd] = useState(false);
  const { data: projList } = useFetch('/projects');
  const url = project ? `/memories?project=${project}&limit=50${search?'&search='+encodeURIComponent(search):''}` : null;
  const { data, reload } = useFetch(url || '/memories?project=geral&limit=50', [project, search]);

  useEffect(() => { if(selectedProject) setProject(selectedProject); }, [selectedProject]);

  const [newContent, setNewContent] = useState('');
  const [newType, setNewType] = useState('CONTEXT');
  const doSave = () => {
    if(!newContent.trim() || !project) return;
    fetch(API+'/memories', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({project, content:newContent, type:newType})
    }).then(() => { setNewContent(''); setShowAdd(false); reload(); });
  };
  const doDelete = (id) => {
    fetch(API+`/memories/${id}?project=${project}&reason=Removido via dashboard`, {method:'DELETE'})
      .then(() => reload());
  };

  return (
    <div>
      <div className="main-header">
        <h2>Memórias</h2>
        <p>Gestão de memórias persistentes por projeto</p>
      </div>

      <div style={{display:'flex', gap:12, marginBottom:16}}>
        <select value={project} onChange={e => setProject(e.target.value)} style={{width:200}}>
          <option value="">Selecione um projeto</option>
          {(projList||[]).map(p => <option key={p.name} value={p.name}>{p.name} ({p.memoryCount})</option>)}
        </select>
        <div className="search-bar" style={{flex:1, marginBottom:0}}>
          <Icon.Search />
          <input placeholder="Buscar memórias..." value={search} onChange={e => setSearch(e.target.value)} />
        </div>
        <button className="btn btn-primary" onClick={() => setShowAdd(true)}>
          <Icon.Plus /> Nova
        </button>
      </div>

      {data?.memories?.length > 0 ? (
        <div className="table-wrap">
          <div className="table-header">
            <h3>{data.count} memória(s) — {project}</h3>
          </div>
          <table>
            <thead><tr><th>Tipo</th><th>Conteúdo</th><th>Data</th><th></th></tr></thead>
            <tbody>
              {data.memories.map(m => (
                <tr key={m.id}>
                  <td><TypeBadge type={m.type} /></td>
                  <td style={{maxWidth:400, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}
                      title={m.content}>{m.content}</td>
                  <td style={{fontSize:11, color:'var(--dim)', whiteSpace:'nowrap'}}>
                    {new Date(m.created_at).toLocaleDateString('pt-BR')}
                  </td>
                  <td>
                    <button className="btn btn-sm btn-danger" onClick={() => doDelete(m.id)} title="Remover">
                      <Icon.Trash />
                    </button>

              ))}

          </table>
        </div>
      ) : (
        <div className="empty">
          <Icon.Brain />
          <p>{project ? 'Nenhuma memória encontrada' : 'Selecione um projeto'}</p>
        </div>
      )}

      {showAdd && (
        <div className="modal-overlay" onClick={() => setShowAdd(false)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <h3>Nova Memória — {project}</h3>
            <div className="form-group">
              <label className="form-label">Tipo</label>
              <select value={newType} onChange={e => setNewType(e.target.value)}>
                <option value="DECISION">DECISION — Decisão arquitetural</option>
                <option value="PATTERN">PATTERN — Padrão de código</option>
                <option value="ERROR">ERROR — Bug e correção</option>
                <option value="CONTEXT">CONTEXT — Contexto geral</option>
                <option value="PERSON">PERSON — Info sobre pessoa</option>

            <div className="form-group">
              <label className="form-label">Conteúdo</label>

// ── Rules Page ──────────────────────────────────────────────────────────────
function Rules() {
  const { data, reload } = useFetch('/rules');
  const [selected, setSelected] = useState(null); // null=geral, string=projeto
  const [content, setContent] = useState('');
  const [editing, setEditing] = useState(false);

  useEffect(() => {
    if (!data) return;
    if (selected === null) { setContent(data.general || ''); }
    else {
      fetch(API+`/rules?project=${selected}`).then(r=>r.json()).then(d => setContent(d.content || ''));
    }
  }, [selected, data]);

  const doSave = () => {
    fetch(API+'/rules', { method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ project: selected, content })
    }).then(() => { setEditing(false); reload(); });
  };

  return (
    <div>
      <div className="main-header">
        <h2>Regras dos Projetos</h2>
        <p>Gestão visual das regras gerais e por projeto</p>
      </div>

      <div style={{display:'flex', gap:16}}>
        {/* Sidebar de projetos */}
        <div style={{width:200, flexShrink:0}}>
          <div className={`nav-item ${selected===null?'active':''}`} onClick={() => { setSelected(null); setEditing(false); }}>
            <Icon.Shield /> Regras Gerais
          </div>
          {(data?.projects||[]).map(p => (
            <div key={p.project} className={`nav-item ${selected===p.project?'active':''}`}
                 onClick={() => { setSelected(p.project); setEditing(false); }}>
              <Icon.Folder />
              {p.project}
              {p.hasRules ? <span style={{fontSize:10,color:'var(--gn)'}}>●</span>
                          : <span style={{fontSize:10,color:'var(--rd)'}}>○</span>}
            </div>
          ))}
        </div>

        {/* Editor */}
        <div style={{flex:1}}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12}}>
            <h3 style={{fontSize:16}}>{selected === null ? 'Regras Gerais' : `Regras — ${selected}`}</h3>
            <div style={{display:'flex', gap:8}}>
              {editing ? (
                <>
                  <button className="btn" onClick={() => setEditing(false)}>Cancelar</button>
                  <button className="btn btn-primary" onClick={doSave}>Salvar</button>
                </>
              ) : (
                <button className="btn" onClick={() => setEditing(true)}><Icon.Edit /> Editar</button>
              )}
            </div>
          </div>
          {editing ? (
            <textarea style={{minHeight:400, fontFamily:'SF Mono, Menlo, monospace', fontSize:12, lineHeight:1.6}}
                      value={content} onChange={e => setContent(e.target.value)} />
          ) : (
            <div className="rules-editor" dangerouslySetInnerHTML={{
              __html: content ? content.replace(/\n/g,'<br>').replace(/^# (.+)/gm,'<h1 style="font-size:18px;color:var(--ac2);margin:12px 0 6px">$1</h1>')
                .replace(/^## (.+)/gm,'<h2 style="font-size:15px;color:var(--tx);margin:10px 0 4px">$1</h2>')
                .replace(/^### (.+)/gm,'<h3 style="font-size:13px;color:var(--dim);margin:8px 0 4px">$1</h3>')
                .replace(/\*\*(.+?)\*\*/g,'<strong style="color:var(--ac2)">$1</strong>')
                .replace(/`(.+?)`/g,'<code style="background:var(--s3);padding:1px 4px;border-radius:3px;font-size:12px">$1</code>')
                .replace(/^- (.+)/gm,'<div style="padding-left:16px">• $1</div>')
              : '<span style="color:var(--dim)">Nenhuma regra definida. Clique em Editar para criar.</span>'
            }} />
          )}
        </div>
      </div>
    </div>
  );
}

                </div>
                <div style={{display:'flex', gap:4, height:24}}>
                  {/* Visual: barra proporcional 7d vs 30d vs rest */}
                  {p.git.commits7d > 0 && (
                    <div style={{flex:p.git.commits7d, background:'var(--gn)', borderRadius:4, display:'flex', alignItems:'center', justifyContent:'center', fontSize:10, color:'#000', fontWeight:700, minWidth:30}}>

                      {p.git.totalCommits - p.git.commits30d} (antigos)
                    </div>
                  )}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ── Hardware Dashboard ───────────────────────────────────────────────────────
function Hardware() {
  const [hw, setHw] = useState(null);
  const [loading, setLoading] = useState(true);
  const [autoRefresh, setAutoRefresh] = useState(true);
  const [lastTs, setLastTs] = useState(null);

  const fetchHw = useCallback(() => {
    setLoading(true);
    fetch(API + '/hardware')
      .then(r => r.json())
      .then(d => { setHw(d); setLastTs(new Date().toLocaleTimeString('pt-BR')); setLoading(false); })
      .catch(() => setLoading(false));
  }, []);

  useEffect(() => { fetchHw(); }, []);
  useEffect(() => {
    if (!autoRefresh) return;
    const t = setInterval(fetchHw, 4000);
    return () => clearInterval(t);
  }, [autoRefresh, fetchHw]);

  const fmt = (b) => {
    if (b >= 1e9) return (b/1e9).toFixed(1) + ' GB';
    if (b >= 1e6) return (b/1e6).toFixed(1) + ' MB';
    return (b/1e3).toFixed(0) + ' KB';
  };
  const pctColor = (p) => p >= 85 ? 'var(--rd)' : p >= 65 ? 'var(--yw)' : 'var(--gn)';
  const pctClass = (p) => p >= 85 ? 'hw-badge-crit' : p >= 65 ? 'hw-badge-warn' : 'hw-badge-ok';
  const pctGrad = (p) => ({
    width: p + '%',
    background: pctColor(p),
  });

  const GaugeRing = ({ pct, size=72, label }) => {
    const r = size * 0.37, circ = 2 * Math.PI * r;
    return (
      <div className="gauge-big-ring" style={{width:size, height:size}}>
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{transform:'rotate(-90deg)'}}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--s3)" strokeWidth={size*0.1}/>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={pctColor(pct)}
            strokeWidth={size*0.1} strokeLinecap="round"
            strokeDasharray={circ} strokeDashoffset={circ*(1-pct/100)}
            style={{transition:'stroke-dashoffset .5s'}}/>
        </svg>
        <div className="pct-label" style={{fontSize:size*0.18, color:pctColor(pct)}}>{pct}%</div>
      </div>
    );
  };

  const BarRow = ({ label, pct, sub }) => (
    <div className="gauge-bar">
      <div className="gauge-bar-row">
        <div className="gauge-bar-label" title={label}>{label}</div>
        <div className="gauge-bar-track">
          <div className="gauge-bar-fill" style={pctGrad(pct)} />
        </div>
        <div className={`gauge-bar-pct ${pctClass(pct)}`}>{pct}%</div>
      </div>
      {sub && <div style={{fontSize:10,color:'var(--muted)',paddingLeft:100}}>{sub}</div>}
    </div>
  );

  const SUGGESTIONS = [
    { icon:'🌡️', title:'Temperatura da CPU', desc:'Monitorar temperatura dos núcleos (requer lm-sensors no Linux ou smc no macOS). Alertar acima de 80°C.', tag:'easy', tagLabel:'Fácil' },
    { icon:'📶', title:'Latência de Rede (Ping)', desc:'Ping periódico para o servidor de produção (62.72.63.18) e para 8.8.8.8. Detectar degradação antes do usuário.', tag:'easy', tagLabel:'Fácil' },
    { icon:'💾', title:'I/O de Disco em Tempo Real', desc:'Bytes lidos/escritos por segundo com psutil.disk_io_counters(). Identificar processos abusando de I/O.', tag:'easy', tagLabel:'Fácil' },
    { icon:'🔌', title:'Conexões TCP Ativas', desc:'psutil.net_connections() por estado (ESTABLISHED, TIME_WAIT, CLOSE_WAIT). Detectar vazamento de conexões.', tag:'medium', tagLabel:'Médio' },
    { icon:'📊', title:'Histórico de 24h (Sparkline)', desc:'Armazenar amostras de CPU/RAM em SQLite a cada minuto e exibir mini-gráfico de tendência nas últimas 24h.', tag:'medium', tagLabel:'Médio' },
    { icon:'🚨', title:'Alertas de Threshold', desc:'Notificação (email/webhook) quando CPU>85%, RAM>90% ou Disco>95%. Integrar com o sistema de logs existente.', tag:'medium', tagLabel:'Médio' },
    { icon:'🐳', title:'Status de Containers Docker', desc:'docker stats via subprocess: CPU, RAM e status de cada container (app, buffer, postgres). Mostrar ao lado do deploy.', tag:'medium', tagLabel:'Médio' },
    { icon:'📈', title:'Métricas de App (APM)', desc:'Instrumentar o Express/Flask com métricas de requisição: latência p50/p95/p99, throughput e taxa de erros HTTP.', tag:'hard', tagLabel:'Avançado' },
    { icon:'🔍', title:'Log Tail em Tempo Real', desc:'Endpoint SSE que faz tail dos logs da aplicação em produção via SSH, exibindo em streaming no dashboard.', tag:'hard', tagLabel:'Avançado' },
    { icon:'🧵', title:'Uso por Thread/Processo', desc:'Detalhar threads ativas do Python e Node.js (gcstats, event loop lag). Detectar event loop blocado no Buffer WhatsApp.', tag:'hard', tagLabel:'Avançado' },
  ];

  if (loading && !hw) return <div className="empty"><p>Carregando hardware...</p></div>;
  if (hw?.error) return <div className="empty"><p style={{color:'var(--rd)'}}>Erro: {hw.error}</p></div>;
  if (!hw) return null;

  const { cpu, memory, disk, network, system, top_processes } = hw;

  return (
    <div>
      {/* Header */}
      <div className="main-header" style={{display:'flex', alignItems:'flex-start', justifyContent:'space-between'}}>
        <div>
          <h2>Hardware — KPIs do Servidor</h2>
          <p>Consumo em tempo real · auto-refresh a cada 4s · {system.platform.split(' ').slice(0,3).join(' ')}</p>
        </div>
        <div style={{display:'flex', gap:8, alignItems:'center', marginTop:4}}>
          <span className="hw-ts">{lastTs ? `Atualizado às ${lastTs}` : ''}</span>
          <button className={`btn btn-sm ${autoRefresh?'btn-primary':''}`}
                  onClick={() => setAutoRefresh(a => !a)}>
            {autoRefresh ? '⏸ Auto' : '▶ Auto'}
          </button>
          <button className="btn btn-sm" onClick={fetchHw}><Icon.Refresh /> Refresh</button>
        </div>
      </div>

      {/* KPI cards top */}
      <div className="cards" style={{gridTemplateColumns:'repeat(auto-fill, minmax(160px, 1fr))', marginBottom:20}}>
        <div className="card">
          <div className="card-label">CPU Total</div>
          <div className={`card-value ${pctClass(cpu.percent).replace('hw-badge-','')}`} style={{fontSize:32}}>{cpu.percent}%</div>
          <div className="card-sub">{cpu.count_physical}C/{cpu.count_logical}T · {cpu.freq_current ? (cpu.freq_current/1000).toFixed(1)+'GHz' : '—'}</div>
        </div>
        <div className="card">
          <div className="card-label">RAM</div>
          <div className={`card-value ${pctClass(memory.percent).replace('hw-badge-','')}`} style={{fontSize:32}}>{memory.percent}%</div>
          <div className="card-sub">{fmt(memory.used)} / {fmt(memory.total)}</div>
        </div>
        <div className="card">
          <div className="card-label">Disco Principal</div>
          {disk.length > 0
            ? <><div className={`card-value ${pctClass(disk[0].percent).replace('hw-badge-','')}`} style={{fontSize:32}}>{disk[0].percent}%</div>
                <div className="card-sub">{fmt(disk[0].used)} / {fmt(disk[0].total)}</div></>
            : <div className="card-value blue" style={{fontSize:20}}>—</div>}
        </div>
        <div className="card">
          <div className="card-label">Uptime</div>
          <div className="card-value cyan" style={{fontSize:24}}>{system.uptime_hours}h</div>
          <div className="card-sub">Boot: {system.boot_time}</div>
        </div>
        <div className="card">
          <div className="card-label">Processos</div>
          <div className="card-value blue" style={{fontSize:32}}>{system.process_count}</div>
          <div className="card-sub">Ativos no sistema</div>
        </div>
        <div className="card">
          <div className="card-label">Load Avg</div>
          <div className="card-value orange" style={{fontSize:20}}>{cpu.load_avg_1m}</div>
          <div className="card-sub">{cpu.load_avg_5m} (5m) · {cpu.load_avg_15m} (15m)</div>
        </div>
      </div>

      {/* CPU + Memory gauges */}
      <div className="hw-grid2" style={{marginBottom:18}}>
        {/* CPU */}
        <div className="hw-section">
          <div className="hw-section-title"><Icon.Cpu /> CPU</div>
          <div className="gauge-big" style={{marginBottom:16}}>
            <GaugeRing pct={cpu.percent} size={80} />
            <div style={{flex:1}}>
              <div className="hw-stat-label">Uso Global</div>
              <div className="hw-stat-value" style={{color:pctColor(cpu.percent)}}>{cpu.percent}%</div>
              <div className="hw-stat-sub">{cpu.freq_current ? `${(cpu.freq_current/1000).toFixed(2)} GHz atual / ${(cpu.freq_max/1000).toFixed(2)} GHz max` : 'Freq. não disponível'}</div>
            </div>
          </div>
          <div>
            {(cpu.per_core || []).map((p, i) => (
              <BarRow key={i} label={`Core ${i}`} pct={Math.round(p)} />
            ))}
          </div>
          <div style={{marginTop:10, display:'flex', gap:16, fontSize:11, color:'var(--dim)'}}>
            <span>Load 1m: <strong style={{color:'var(--tx)'}}>{cpu.load_avg_1m}</strong></span>
            <span>5m: <strong style={{color:'var(--tx)'}}>{cpu.load_avg_5m}</strong></span>
            <span>15m: <strong style={{color:'var(--tx)'}}>{cpu.load_avg_15m}</strong></span>
          </div>
        </div>

        {/* Memory */}
        <div className="hw-section">
          <div className="hw-section-title"><Icon.Database /> Memória</div>
          <div className="gauge-big" style={{marginBottom:16}}>
            <GaugeRing pct={memory.percent} size={80} />
            <div style={{flex:1}}>
              <div className="hw-stat-label">RAM Usada</div>
              <div className="hw-stat-value" style={{color:pctColor(memory.percent)}}>{fmt(memory.used)}</div>
              <div className="hw-stat-sub">Disponível: {fmt(memory.available)} · Total: {fmt(memory.total)}</div>
            </div>
          </div>
          <BarRow label="RAM" pct={memory.percent} sub={`${fmt(memory.used)} usada de ${fmt(memory.total)}`} />
          {memory.swap_total > 0 && (
            <BarRow label="Swap" pct={Math.round(memory.swap_percent)} sub={`${fmt(memory.swap_used)} usada de ${fmt(memory.swap_total)}`} />
          )}
          <div style={{marginTop:10, display:'flex', gap:16, fontSize:11, color:'var(--dim)'}}>
            <span>Total: <strong style={{color:'var(--tx)'}}>{fmt(memory.total)}</strong></span>
            <span>Livre: <strong style={{color:'var(--gn)'}}>{fmt(memory.available)}</strong></span>
          </div>
        </div>
      </div>

      {/* Disco */}
      <div className="hw-section" style={{marginBottom:18}}>
        <div className="hw-section-title"><Icon.HardDrive /> Disco</div>
        <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(280px, 1fr))', gap:16}}>
          {disk.map((d, i) => (
            <div key={i}>
              <div style={{display:'flex', justifyContent:'space-between', fontSize:12, marginBottom:6}}>
                <span style={{fontWeight:600, color:'var(--tx)'}}>{d.mountpoint}</span>
                <span style={{color:'var(--dim)', fontSize:11}}>{d.device} · {d.fstype}</span>
              </div>
              <BarRow label={`${fmt(d.used)} / ${fmt(d.total)}`} pct={Math.round(d.percent)}
                      sub={`${fmt(d.free)} livres`} />
            </div>
          ))}
        </div>
      </div>

      {/* Rede + Processos */}
      <div className="hw-grid2" style={{marginBottom:18}}>
        {/* Rede */}
        <div className="hw-section">
          <div className="hw-section-title"><Icon.Wifi /> Rede</div>
          <div className="hw-grid2" style={{marginBottom:14}}>
            <div className="hw-stat">
              <div className="hw-stat-label">↓ Recebido</div>
              <div className="hw-stat-value" style={{color:'var(--ac2)'}}>{fmt(network.bytes_recv)}</div>
              <div className="hw-stat-sub">{(network.packets_recv||0).toLocaleString('pt-BR')} pacotes</div>
            </div>
            <div className="hw-stat">
              <div className="hw-stat-label">↑ Enviado</div>
              <div className="hw-stat-value" style={{color:'var(--gn)'}}>{fmt(network.bytes_sent)}</div>
              <div className="hw-stat-sub">{(network.packets_sent||0).toLocaleString('pt-BR')} pacotes</div>
            </div>
          </div>
          <div style={{display:'flex', gap:20, fontSize:11, color:'var(--dim)'}}>
            <span>Erros Entrada: <strong style={{color: network.errin>0?'var(--rd)':'var(--gn)'}}>{network.errin}</strong></span>
            <span>Erros Saída: <strong style={{color: network.errout>0?'var(--rd)':'var(--gn)'}}>{network.errout}</strong></span>
          </div>
        </div>

        {/* Top Processos */}
        <div className="hw-section">
          <div className="hw-section-title"><Icon.Zap /> Top 5 Processos (CPU)</div>
          <table style={{width:'100%', borderCollapse:'collapse', fontSize:12}}>
            <thead>
              <tr>
                <th style={{textAlign:'left',color:'var(--dim)',fontWeight:600,fontSize:10,textTransform:'uppercase',letterSpacing:'.8px',paddingBottom:8}}>Processo</th>
                <th style={{textAlign:'right',color:'var(--dim)',fontWeight:600,fontSize:10,textTransform:'uppercase',letterSpacing:'.8px',paddingBottom:8}}>CPU</th>
                <th style={{textAlign:'right',color:'var(--dim)',fontWeight:600,fontSize:10,textTransform:'uppercase',letterSpacing:'.8px',paddingBottom:8}}>MEM</th>
                <th style={{textAlign:'right',color:'var(--dim)',fontWeight:600,fontSize:10,textTransform:'uppercase',letterSpacing:'.8px',paddingBottom:8}}>PID</th>
              </tr>
            </thead>
            <tbody>
              {(top_processes||[]).map((p, i) => (
                <tr key={i}>
                  <td style={{paddingBottom:6, maxWidth:120, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}} title={p.name}>{p.name}</td>
                  <td style={{textAlign:'right', fontWeight:700, color:pctColor(p.cpu)}}>{p.cpu}%</td>
                  <td style={{textAlign:'right', color:'var(--ac2)'}}>{p.mem}%</td>
                  <td style={{textAlign:'right', color:'var(--muted)', fontSize:11}}>{p.pid}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {/* Sugestões */}
      <div className="hw-section">
        <div className="hw-section-title"><Icon.Chart /> Outros Índices Recomendados</div>
        <p style={{fontSize:12, color:'var(--dim)', marginBottom:16, lineHeight:1.6}}>
          Métricas adicionais que podem ser integradas ao dashboard para monitoramento mais completo:
        </p>
        {SUGGESTIONS.map((s, i) => (
          <div key={i} className="hw-suggest-row">
            <div className="hw-suggest-icon">{s.icon}</div>
            <div className="hw-suggest-body">
              <div className="hw-suggest-title">
                {s.title}
                <span className={`hw-suggest-tag ${s.tag}`}>{s.tagLabel}</span>
              </div>
              <div className="hw-suggest-desc">{s.desc}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Containers Tab ───────────────────────────────────────────────────────────
function ContainersTab() {
  const [data, setData] = useState(null);
  const [coolifyApps, setCoolifyApps] = useState(null);
  const [loading, setLoading] = useState(true);
  const [autoRefresh, setAutoRefresh] = useState(true);
  const [lastTs, setLastTs] = useState(null);

  const fetchData = useCallback(() => {
    setLoading(true);
    Promise.all([
      fetch(API + '/server/docker/stats').then(r => r.json()).catch(() => null),
      fetch(API + '/server/coolify/applications').then(r => r.json()).catch(() => null),
    ]).then(([docker, coolify]) => {
      setData(docker);
      setCoolifyApps(coolify);
      setLastTs(new Date().toLocaleTimeString('pt-BR'));
      setLoading(false);
    });
  }, []);

  useEffect(() => { fetchData(); }, []);
  useEffect(() => {
    if (!autoRefresh) return;
    const t = setInterval(fetchData, 10000);
    return () => clearInterval(t);
  }, [autoRefresh, fetchData]);

  const parsePct = (s) => parseFloat((s||'0%').replace('%','')) || 0;
  const pctColor = (p) => p >= 85 ? 'var(--rd)' : p >= 65 ? 'var(--yw)' : 'var(--gn)';

  // Container groups
  const GROUPS = {
    'Coolify Apps': ['controler','myclinicsoft','whatsapp-buffer'],
    'XoSpam': ['xospam_web','xospam_admin','xospam_api','xospam_postgres','xospam_redis','xospam_ollama'],
    'Email': ['stalwart-mail','roundcube-webmail'],
    'Bancos': ['postgres-main','coolify-db'],
    'Infra Coolify': ['coolify','coolify-proxy','coolify-sentinel','coolify-redis','coolify-realtime'],
    'AI Agent': ['openclaw'],
  };

  const getGroup = (name) => {
    for (const [group, members] of Object.entries(GROUPS)) {
      if (members.some(m => name.includes(m) || name.toLowerCase().includes(m.replace('-','')))) return group;
    }
    return 'Outros';
  };

  const statusIcon = (status) => {
    if (!status) return '⚪';
    const s = status.toLowerCase();
    if (s.includes('healthy')) return '🟢';
    if (s.includes('unhealthy') || s.includes('exited')) return '🔴';
    if (s.includes('running') || s.includes('up')) return '🟡';
    return '⚪';
  };

  if (loading && !data) return <div className="empty"><p>Carregando containers...</p></div>;

  const containers = data?.containers || [];
  const grouped = {};
  containers.forEach(c => {
    const g = getGroup(c.display_name || c.name);
    if (!grouped[g]) grouped[g] = [];
    grouped[g].push(c);
  });

  // Coolify app status enrichment
  const coolifyMap = {};
  (coolifyApps?.applications || []).forEach(a => { coolifyMap[a.name] = a; });

  // Totals
  const hasRealStats = data?.source === 'docker_socket';
  const totalCpu = containers.reduce((s, c) => s + parsePct(c.cpu_percent), 0);
  const healthyCount = containers.filter(c => (c.docker_status||'').toLowerCase().includes('healthy')).length;
  const runningCount = containers.filter(c => (c.docker_status||c.state||'').toLowerCase().includes('running')).length;

  return (
    <div>
      {/* KPI cards */}
      <div className="cards" style={{gridTemplateColumns:'repeat(auto-fill, minmax(160px, 1fr))', marginBottom:20}}>
        <div className="card">
          <div className="card-label">Aplicações</div>
          <div className="card-value blue" style={{fontSize:32}}>{containers.length}</div>
          <div className="card-sub">{runningCount} em execução</div>
        </div>
        <div className="card">
          <div className="card-label">Healthy</div>
          <div className="card-value green" style={{fontSize:32}}>{healthyCount}</div>
          <div className="card-sub">Health check OK</div>
        </div>
        {hasRealStats && (
          <div className="card">
            <div className="card-label">CPU Total</div>
            <div className="card-value orange" style={{fontSize:32}}>{totalCpu.toFixed(1)}%</div>
            <div className="card-sub">Soma de todos containers</div>
          </div>
        )}
        <div className="card">
          <div className="card-label">Fonte</div>
          <div className="card-value" style={{fontSize:14, color:'var(--ac2)'}}>{data?.source === 'docker_socket' ? '🔌 Docker' : '☁️ Coolify API'}</div>
          <div className="card-sub">{data?.source === 'docker_socket' ? 'Dados em tempo real' : 'Status gerenciado'}</div>
        </div>
      </div>

      {/* Controls */}
      <div style={{display:'flex', gap:8, alignItems:'center', marginBottom:16}}>
        <span className="hw-ts">{lastTs ? `Atualizado às ${lastTs}` : ''}</span>
        <button className={`btn btn-sm ${autoRefresh?'btn-primary':''}`}
                onClick={() => setAutoRefresh(a => !a)}>
          {autoRefresh ? '⏸ Auto (10s)' : '▶ Auto'}
        </button>
        <button className="btn btn-sm" onClick={fetchData}><Icon.Refresh /> Refresh</button>
      </div>

      {/* Coolify Managed Apps */}
      {(coolifyApps?.applications||[]).length > 0 && (
        <div className="hw-section" style={{marginBottom:18}}>
          <div className="hw-section-title"><Icon.Rocket /> Aplicações Coolify</div>
          <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(280px, 1fr))', gap:12}}>
            {(coolifyApps.applications||[]).map(a => (
              <div key={a.uuid} className="card" style={{padding:14}}>
                <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:8}}>
                  <span style={{fontSize:14}}>{a.status?.includes('healthy') ? '🟢' : a.status?.includes('running') ? '🟡' : '🔴'}</span>
                  <strong style={{fontSize:14}}>{a.name}</strong>
                  <span className="badge badge-decision" style={{marginLeft:'auto'}}>{a.build_pack}</span>
                </div>
                <div style={{fontSize:11, color:'var(--dim)', lineHeight:1.8}}>
                  <div>🌐 {a.fqdn || '—'}</div>
                  <div>📁 {a.git_repository?.split('/').pop() || '—'} / {a.git_branch}</div>
                  <div>🔌 Porta: {a.ports_exposes || '—'}</div>
                  <div>❤️ Health: {a.health_check_path || '—'}</div>
                  <div>📊 Status: <span style={{color: a.status?.includes('healthy') ? 'var(--gn)' : 'var(--yw)'}}>{a.status}</span></div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Grouped container tables */}
      {Object.entries(GROUPS).map(([group]) => {
        const items = grouped[group];
        if (!items || items.length === 0) return null;
        return (
          <div key={group} className="hw-section" style={{marginBottom:14}}>
            <div className="hw-section-title">{group === 'Coolify Apps' ? '📦' : group === 'XoSpam' ? '🛡️' : group === 'Email' ? '✉️' : group === 'Bancos' ? '🗄️' : group === 'Infra Coolify' ? '⚙️' : '🤖'} {group}</div>
            <table style={{width:'100%', borderCollapse:'collapse', fontSize:12}}>
              <thead>
                <tr>
                  {['Container','Status',hasRealStats&&'CPU',hasRealStats&&'RAM',hasRealStats&&'Net I/O','Tipo'].filter(Boolean).map(h => (
                    <th key={h} style={{textAlign:['CPU','RAM','Net I/O'].includes(h)?'right':'left',color:'var(--dim)',fontWeight:600,fontSize:10,textTransform:'uppercase',letterSpacing:'.8px',paddingBottom:8}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {items.map((c, i) => {
                  const cpuVal = parsePct(c.cpu_percent);
                  return (
                    <tr key={i}>
                      <td style={{paddingBottom:6, fontWeight:600}}>
                        {statusIcon(c.docker_status)} {c.display_name || c.name}
                      </td>
                      <td style={{paddingBottom:6, fontSize:11, color:'var(--dim)'}}>
                        {c.docker_status?.replace(/\s*\(.*\)/, '') || '—'}
                      </td>
                      {hasRealStats && <>
                        <td style={{textAlign:'right', paddingBottom:6, fontWeight:700, color:pctColor(cpuVal)}}>
                          {c.cpu_percent}
                        </td>
                        <td style={{textAlign:'right', paddingBottom:6, color:'var(--ac2)'}}>
                          {c.mem_usage?.split('/')[0]?.trim() || '—'}
                          <span style={{fontSize:10, color:'var(--muted)', marginLeft:3}}>{c.mem_percent}</span>
                        </td>
                        <td style={{textAlign:'right', paddingBottom:6, fontSize:11, color:'var(--dim)'}}>
                          {c.net_io || '—'}
                        </td>
                      </>}
                      <td style={{paddingBottom:6, fontSize:10, color:'var(--muted)'}}>
                        {c.type || (c.image?.split('/').pop()?.split(':')[0]) || '—'}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        );
      })}
    </div>
  );
}

// ── OpenClaw Tab ──────────────────────────────────────────────────────────────
function OpenClawTab() {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [lastTs, setLastTs] = useState(null);

  const fetchData = useCallback(() => {
    setLoading(true);
    fetch(API + '/server/openclaw/status')
      .then(r => r.json())
      .then(d => { setData(d); setLastTs(new Date().toLocaleTimeString('pt-BR')); setLoading(false); })
      .catch(() => setLoading(false));
  }, []);

  useEffect(() => { fetchData(); }, []);

  if (loading && !data) return <div className="empty"><p>Carregando OpenClaws...</p></div>;
  if (data?.error) return <div className="empty"><p style={{color:'var(--rd)'}}>Erro: {data.error}</p></div>;
  if (!data) return null;

  const { container, cron, config } = data;
  const jobs = cron?.jobs || [];
  const healthyContainer = container?.health === 'healthy';

  const cronStatusIcon = (job) => {
    if (!job.state) return '⏳';
    if (job.state.lastRunStatus === 'error') return '🔴';
    if (job.state.lastRunStatus === 'ok' || job.state.lastRunStatus === 'success') return '🟢';
    return '🟡';
  };

  const fmtMs = (ms) => {
    if (!ms) return '—';
    const d = new Date(ms);
    return d.toLocaleString('pt-BR', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'});
  };

  return (
    <div>
      {/* Header controls */}
      <div style={{display:'flex', gap:8, alignItems:'center', marginBottom:16}}>
        <span className="hw-ts">{lastTs ? `Atualizado às ${lastTs}` : ''}</span>
        <button className="btn btn-sm" onClick={fetchData}><Icon.Refresh /> Refresh</button>
      </div>

      {/* Agent Status */}
      <div className="cards" style={{gridTemplateColumns:'repeat(auto-fill, minmax(160px, 1fr))', marginBottom:20}}>
        <div className="card">
          <div className="card-label">Container</div>
          <div className={`card-value ${healthyContainer ? 'green' : 'hw-badge-crit'}`} style={{fontSize:20}}>
            {healthyContainer ? '🟢 Healthy' : '🔴 ' + (container?.health || 'Down')}
          </div>
          <div className="card-sub">State: {container?.state || '—'}</div>
        </div>
        <div className="card">
          <div className="card-label">Modelo IA</div>
          <div className="card-value purple" style={{fontSize:14}}>{config?.model || '—'}</div>
          <div className="card-sub">Claude Opus 4.5</div>
        </div>
        <div className="card">
          <div className="card-label">Cron Jobs</div>
          <div className="card-value blue" style={{fontSize:32}}>{jobs.length}</div>
          <div className="card-sub">{jobs.filter(j => j.enabled).length} ativos</div>
        </div>
        <div className="card">
          <div className="card-label">Erros Cron</div>
          <div className={`card-value ${jobs.some(j => j.state?.lastRunStatus === 'error') ? 'hw-badge-crit' : 'green'}`} style={{fontSize:32}}>
            {jobs.filter(j => j.state?.lastRunStatus === 'error').length}
          </div>
          <div className="card-sub">de {jobs.length} jobs</div>
        </div>
      </div>

      {/* Config Info */}
      <div className="hw-section" style={{marginBottom:18}}>
        <div className="hw-section-title">⚙️ Configuração do Agente</div>
        <div className="hw-grid3" style={{fontSize:12}}>
          <div className="hw-stat">
            <div className="hw-stat-label">Gateway</div>
            <div className="hw-stat-value" style={{fontSize:14}}>:{config?.gateway_port || '—'}</div>
          </div>
          <div className="hw-stat">
            <div className="hw-stat-label">Cron Ativo</div>
            <div className="hw-stat-value" style={{fontSize:14, color: config?.cron_enabled ? 'var(--gn)' : 'var(--rd)'}}>
              {config?.cron_enabled ? '✅ Sim' : '❌ Não'}
            </div>
          </div>
          <div className="hw-stat">
            <div className="hw-stat-label">Max Concorrente</div>
            <div className="hw-stat-value" style={{fontSize:14}}>{config?.max_concurrent || '—'}</div>
          </div>
        </div>
      </div>

      {/* Cron Jobs */}
      <div className="hw-section">
        <div className="hw-section-title">⏰ Cron Jobs</div>
        {jobs.length === 0 ? (
          <div className="empty"><p>Nenhum cron job configurado</p></div>
        ) : (
          <div style={{display:'grid', gap:12}}>
            {jobs.map(job => (
              <div key={job.id} className="card" style={{padding:14}}>
                <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:10}}>
                  <span style={{fontSize:16}}>{cronStatusIcon(job)}</span>
                  <strong style={{fontSize:14, flex:1}}>{job.name}</strong>
                  <span className={`badge ${job.enabled ? 'badge-decision' : 'badge-cleanup'}`}>
                    {job.enabled ? 'Ativo' : 'Inativo'}
                  </span>
                </div>
                <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:10, fontSize:11, color:'var(--dim)', marginBottom:8}}>
                  <div>
                    <div style={{textTransform:'uppercase', letterSpacing:'.5px', fontSize:9, marginBottom:2}}>Schedule</div>
                    <div style={{color:'var(--tx)', fontFamily:'monospace'}}>{job.schedule?.expr || '—'}</div>
                    <div>{job.schedule?.tz || '—'}</div>
                  </div>
                  <div>
                    <div style={{textTransform:'uppercase', letterSpacing:'.5px', fontSize:9, marginBottom:2}}>Última Exec</div>
                    <div style={{color:'var(--tx)'}}>{fmtMs(job.state?.lastRunAtMs)}</div>
                    <div>{job.state?.lastDurationMs ? (job.state.lastDurationMs/1000).toFixed(1) + 's' : '—'}</div>
                  </div>
                  <div>
                    <div style={{textTransform:'uppercase', letterSpacing:'.5px', fontSize:9, marginBottom:2}}>Próxima Exec</div>
                    <div style={{color:'var(--ac2)'}}>{fmtMs(job.state?.nextRunAtMs)}</div>
                  </div>
                </div>
                {job.state?.lastError && (
                  <div style={{background:'rgba(239,68,68,.1)', border:'1px solid rgba(239,68,68,.2)', borderRadius:6, padding:'8px 10px', fontSize:11, color:'var(--rd)', marginTop:6}}>
                    <strong>Erro:</strong> {job.state.lastError}
                  </div>
                )}
                {job.state?.consecutiveErrors > 0 && (
                  <div style={{fontSize:10, color:'var(--rd)', marginTop:4}}>
                    ⚠️ {job.state.consecutiveErrors} erros consecutivos
                  </div>
                )}
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ── Project Page (MyClinicSoft) ──────────────────────────────────────────────
function ProjectView() {
  const [status, setStatus] = useState(null);
  const [statusLoading, setStatusLoading] = useState(true);
  const [lastUpdate, setLastUpdate] = useState(null);
  const [deploying, setDeploying] = useState(false);
  const [logs, setLogs] = useState([]);
  const [result, setResult] = useState(null);
  const [syncing, setSyncing] = useState(false);
  const [syncLogs, setSyncLogs] = useState([]);
  const [syncResult, setSyncResult] = useState(null);
  const [showMemory, setShowMemory] = useState(false);
  const { data: memData } = useFetch('/memories?project=myclinicsoft&limit=10');

  const fetchStatus = useCallback(() => {
    setStatusLoading(true);
    fetch(API + '/myclinicsoft/status').then(r => r.json()).catch(() => null)
      .then(s => { setStatus(s); setStatusLoading(false); });
    fetch(API + '/myclinicsoft/last-update').then(r => r.json()).catch(() => null)
      .then(d => { if (d) setLastUpdate(d); });
  }, []);

  useEffect(fetchStatus, []);

  const startDeploy = () => {
    setDeploying(true);
    setLogs([]);
    setResult(null);
    const es = new EventSource(API + '/myclinicsoft/deploy/stream');
    let gotMessage = false;
    es.onmessage = (e) => {
      gotMessage = true;
      try {
        const data = JSON.parse(e.data);
        if (data.step === '__done__') {
          setResult(data.result);
          setDeploying(false);
          es.close();
          fetchStatus();
        } else {
          setLogs(prev => [...prev, data]);
        }
      } catch(err) {
        setLogs(prev => [...prev, {step:'parse', status:'error', message:'Erro ao processar: ' + e.data}]);
      }
    };
    es.onerror = () => {
      setDeploying(false);
      setResult({ success: false, error: gotMessage ? 'Conexão SSE perdida' : 'Não conectou ao endpoint' });
      es.close();
    };
  };

  const startSync = () => {
    setSyncing(true);
    setSyncLogs([]);
    setSyncResult(null);
    const es = new EventSource(API + '/myclinicsoft/whatsdev-sync/stream');
    es.onmessage = (e) => {
      const data = JSON.parse(e.data);
      if (data.step === '__done__') {
        setSyncResult(data.result);
        setSyncing(false);
        es.close();
      } else {
        setSyncLogs(prev => [...prev, data]);
      }
    };
    es.onerror = () => {
      setSyncing(false);
      setSyncResult({ success: false, error: 'Conexão SSE perdida' });
      es.close();
    };
  };

  const stepColor = (s) => s === 'ok' ? 'var(--gn)' : s === 'error' ? 'var(--rd)' : s === 'running' ? 'var(--ac2)' : 'var(--yw)';
  const stepIcon = (s) => s === 'ok' ? '\u2713' : s === 'error' ? '\u2717' : s === 'running' ? '\u27F3' : '\u2026';

  return (
    <div>
      <div className="main-header">
        <h2>Deploy MyClinicSoft</h2>
        <p>Deploy local DEV → Produção (62.72.63.18 (Coolify))</p>
      </div>

      <div className="cards" style={{gridTemplateColumns:'repeat(auto-fill, minmax(180px, 1fr))'}}>
        <div className="card">
          <div className="card-label">SSH</div>
          <div className={`card-value ${statusLoading ? '' : status?.ssh ? 'green' : 'orange'}`} style={{fontSize:20}}>
            {statusLoading ? '...' : status?.ssh ? '\u25CF Conectado' : '\u25CF Offline'}
          </div>
          <div className="card-sub">62.72.63.18 (Coolify)</div>
        </div>
        <div className="card">
          <div className="card-label">App (porta 5000)</div>
          <div className={`card-value ${statusLoading ? '' : status?.app?.online ? 'green' : 'orange'}`} style={{fontSize:20}}>
            {statusLoading ? '...' : status?.app?.online ? '\u25CF Online' : '\u25CF Offline'}
          </div>
          <div className="card-sub">{status?.app?.response || '—'}</div>
        </div>
        <div className="card">
          <div className="card-label">Buffer WhatsApp (3001)</div>
          <div className={`card-value ${statusLoading ? '' : status?.buffer?.online ? 'green' : 'orange'}`} style={{fontSize:20}}>
            {statusLoading ? '...' : status?.buffer?.online ? '\u25CF Online' : '\u25CF Offline'}
          </div>
          <div className="card-sub">{status?.buffer?.response || '—'}</div>
        </div>
        <div className="card">
          <div className="card-label">Última Alteração Local</div>
          <div className="card-value cyan" style={{fontSize:18}}>
            {lastUpdate?.last_update || '—'}
          </div>
          <div className="card-sub" style={{fontSize:10, wordBreak:'break-all'}}>{lastUpdate?.file || ''}</div>
        </div>
      </div>

      <div style={{display:'flex', gap:12, marginBottom:24}}>
        <button className="btn btn-primary" onClick={startDeploy} disabled={deploying}
                style={{padding:'10px 24px', fontSize:14, opacity: deploying ? 0.6 : 1}}>
          <Icon.Rocket /> {deploying ? 'Deploy em andamento...' : 'Deploy → Produção'}
        </button>
        <button className="btn" onClick={startSync} disabled={syncing}
                style={{padding:'10px 24px', fontSize:14, opacity: syncing ? 0.6 : 1}}>
          <Icon.Refresh /> {syncing ? 'Sincronizando...' : 'Sync WhatsApp Prod → Dev'}
        </button>
        <button className="btn btn-sm" onClick={fetchStatus}>
          <Icon.Refresh /> Atualizar Status
        </button>
      </div>

      {(logs.length > 0 || result) && (
        <div className="table-wrap" style={{marginBottom:24}}>
          <div className="table-header">
            <h3>Deploy — Log de Execução</h3>
            {result && (
              <span className={`badge ${result.success ? 'badge-context' : 'badge-error'}`}>
                {result.success ? 'SUCESSO' : 'FALHOU'}
              </span>
            )}
          </div>
          <div style={{padding:16, fontFamily:'SF Mono, Menlo, monospace', fontSize:12, lineHeight:1.8, maxHeight:400, overflowY:'auto'}}>
            {logs.map((l, i) => (
              <div key={i} style={{display:'flex', gap:8, alignItems:'flex-start'}}>
                <span style={{color: stepColor(l.status), fontWeight:700, flexShrink:0, width:16, textAlign:'center'}}>
                  {stepIcon(l.status)}
                </span>
                <span style={{color: l.status === 'error' ? 'var(--rd)' : 'var(--tx)'}}>
                  <span style={{color:'var(--dim)'}}>[{l.step}]</span> {l.message}
                </span>
              </div>
            ))}
            {deploying && (
              <div style={{color:'var(--ac2)', marginTop:8}}>{'\u27F3'} Deploy em execução...</div>
            )}
            {result && !result.success && result.error && (
              <div style={{marginTop:12, padding:12, background:'rgba(239,68,68,.1)', borderRadius:6, border:'1px solid var(--rd)', fontSize:12, color:'var(--rd)'}}>
                <strong>Erro:</strong> {result.error}
              </div>
            )}
          </div>
        </div>
      )}

      {(syncLogs.length > 0 || syncResult) && (
        <div className="table-wrap">
          <div className="table-header">
            <h3>WhatsApp Sync — Log</h3>
            {syncResult && (
              <span className={`badge ${syncResult.success ? 'badge-context' : 'badge-error'}`}>
                {syncResult.success ? 'SUCESSO' : 'FALHOU'}
              </span>
            )}
          </div>
          <div style={{padding:16, fontFamily:'SF Mono, Menlo, monospace', fontSize:12, lineHeight:1.8, maxHeight:300, overflowY:'auto'}}>
            {syncLogs.map((l, i) => (
              <div key={i} style={{display:'flex', gap:8, alignItems:'flex-start'}}>
                <span style={{color: stepColor(l.status), fontWeight:700, flexShrink:0, width:16, textAlign:'center'}}>
                  {stepIcon(l.status)}
                </span>
                <span style={{color: l.status === 'error' ? 'var(--rd)' : 'var(--tx)'}}>
                  <span style={{color:'var(--dim)'}}>[{l.step}]</span> {l.message}
                </span>
              </div>
            ))}
          </div>
        </div>
      )}

      {!logs.length && !syncLogs.length && (
        <div className="table-wrap">
          <div className="table-header"><h3>Pipeline de Deploy</h3></div>
          <div style={{padding:16, fontSize:13, lineHeight:1.8, color:'var(--dim)'}}>
            <div style={{marginBottom:8}}><strong style={{color:'var(--tx)'}}>Etapas do Deploy:</strong></div>
            <div>1. Valida TypeScript (npx tsc --noEmit)</div>
            <div>2. Build do projeto (npm run build)</div>
            <div>3. Git push → main</div>
            <div>4. Coolify API restart (build Nixpacks + container)</div>
            <div>5. Aguarda build + health check</div>
            <div>6. Health check app + buffer</div>
            <div style={{marginTop:12, color:'var(--yw)', fontSize:11}}>
              {'\u26A0'} O Buffer WhatsApp (Docker, porta 3001) NUNCA é afetado pelo deploy.
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

  return (
    <div className="shell">
      <div className="sidebar">
        <div className="sidebar-header">
          <h1><span className="dot" /> Controler</h1>
          <div className="sub">Dashboard de Desenvolvimento</div>
        </div>
        <nav className="nav">
          <div className="nav-section">Principal</div>
          <div className={`nav-item ${page==='overview'?'active':''}`} onClick={() => setPage('overview')}>
            <Icon.Home /> Overview
          </div>
          <div className={`nav-item ${page==='memories'?'active':''}`} onClick={() => setPage('memories')}>
            <Icon.Brain /> Memórias
          </div>
          <div className={`nav-item ${page==='rules'?'active':''}`} onClick={() => setPage('rules')}>
            <Icon.Shield /> Regras
          </div>
          <div className={`nav-item ${page==='kpis'?'active':''}`} onClick={() => setPage('kpis')}>
            <Icon.Chart /> KPIs
          </div>
          <div className={`nav-item ${page==='server'?'active':''}`} onClick={() => setPage('server')}>
            <Icon.Server /> Servidor
          </div>

          <div className="nav-section" style={{marginTop:24}}>DevOps</div>
          <div className={`nav-item ${page==='deploy'?'active':''}`} onClick={() => setPage('deploy')}>
            <Icon.Rocket /> Deploy
          </div>

          <div className="nav-section" style={{marginTop:24}}>Sistema</div>
          <div className="nav-item" style={{fontSize:11}}>
            <span style={{color:'var(--gn)'}}>●</span> API Online — :3001
          </div>
          <div className="nav-item" style={{fontSize:11}}>
            <span style={{color:'var(--gn)'}}>●</span> MCP Ativo
          </div>

      </div>

      <div className="main">
        {page === 'overview' && <Overview onNavigate={navigate} />}
        {page === 'memories' && <Memories selectedProject={selectedProject} />}
        {page === 'rules' && <Rules />}
        {page === 'kpis' && <KPIs />}
        {page === 'server' && <ServerPage />}
        {page === 'deploy' && <ProjectView />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
