<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controler NOC</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://api.fontshare.com" />
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* ═══════════════════════════════════════════
       DESIGN TOKENS — Ethereal Glass / NOC Dark
    ═══════════════════════════════════════════ */
    :root {
      --bg:           #050505;
      --surface-0:    #0a0a0f;
      --surface-1:    #0f0f1a;
      --surface-2:    #141428;
      --border:       rgba(255,255,255,0.06);
      --border-hi:    rgba(255,255,255,0.12);

      /* Accent palette */
      --accent:       #7C6EFA;
      --accent-dim:   rgba(124,110,250,0.15);
      --accent-glow:  rgba(124,110,250,0.35);
      --cyan:         #22D3EE;
      --cyan-dim:     rgba(34,211,238,0.12);
      --green:        #4ADE80;
      --green-dim:    rgba(74,222,128,0.12);
      --yellow:       #FACC15;
      --yellow-dim:   rgba(250,204,21,0.12);
      --red:          #F87171;
      --red-dim:      rgba(248,113,113,0.12);
      --orange:       #FB923C;
      --orange-dim:   rgba(251,146,60,0.12);
      --purple:       #C084FC;

      /* Typography */
      --font-display: 'Clash Display', sans-serif;
      --font-body:    'Plus Jakarta Sans', sans-serif;
      --font-mono:    'JetBrains Mono', monospace;

      /* Spacing */
      --sidebar-w:    220px;
      --topbar-h:     52px;
      --radius:       12px;
      --radius-lg:    18px;

      /* Motion */
      --ease:         cubic-bezier(0.32,0.72,0,1);
      --ease-fast:    cubic-bezier(0.22,1,0.36,1);
    }

    /* ═══════════════════════════════════════════
       RESET + BASE
    ═══════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: rgba(255,255,255,0.85);
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* Mesh gradient background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 0%, rgba(124,110,250,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(34,211,238,0.05) 0%, transparent 55%),
        radial-gradient(ellipse 40% 60% at 50% 50%, rgba(124,110,250,0.03) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    #app { position: relative; z-index: 1; display: flex; height: 100vh; }

    /* ═══════════════════════════════════════════
       SIDEBAR
    ═══════════════════════════════════════════ */
    #sidebar {
      width: var(--sidebar-w);
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: rgba(10,10,15,0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-right: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 50;
      transition: transform 0.35s var(--ease);
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), #5B4DDF);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      box-shadow: 0 0 16px var(--accent-glow);
    }
    .sidebar-logo-text {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #fff;
    }
    .sidebar-logo-tag {
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 500;
      color: var(--accent);
      background: var(--accent-dim);
      padding: 1px 5px;
      border-radius: 4px;
      margin-left: auto;
    }

    .sidebar-section {
      padding: 16px 12px 4px;
    }
    .sidebar-section-label {
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      padding: 0 8px 6px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      color: rgba(255,255,255,0.5);
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s var(--ease);
      border: 1px solid transparent;
      margin-bottom: 1px;
      position: relative;
    }
    .nav-item:hover {
      color: rgba(255,255,255,0.85);
      background: rgba(255,255,255,0.04);
    }
    .nav-item.active {
      color: #fff;
      background: var(--accent-dim);
      border-color: rgba(124,110,250,0.2);
    }
    .nav-item.active::before {
      content: '';
      position: absolute;
      left: 0; top: 25%; bottom: 25%;
      width: 2px;
      background: var(--accent);
      border-radius: 2px;
      box-shadow: 0 0 8px var(--accent-glow);
    }
    .nav-icon { font-size: 15px; opacity: 0.8; flex-shrink: 0; }

    .sidebar-footer {
      margin-top: auto;
      padding: 12px;
      border-top: 1px solid var(--border);
    }
    .status-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: var(--green-dim);
      border: 1px solid rgba(74,222,128,0.15);
      border-radius: 8px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--green);
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.85); }
    }

    /* ═══════════════════════════════════════════
       MAIN AREA
    ═══════════════════════════════════════════ */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
    }

    /* ═══════════════════════════════════════════
       TOPBAR
    ═══════════════════════════════════════════ */
    #topbar {
      height: var(--topbar-h);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px;
      background: rgba(5,5,5,0.6);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 40;
    }
    .topbar-title {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      flex: 1;
    }
    .topbar-clock {
      font-family: var(--font-mono);
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.04em;
    }
    .topbar-btn {
      width: 32px; height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      transition: all 0.2s var(--ease);
      position: relative;
    }
    .topbar-btn:hover {
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.85);
      border-color: var(--border-hi);
    }
    .alert-badge {
      position: absolute;
      top: 4px; right: 4px;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 6px var(--red);
      border: 1px solid var(--bg);
    }
    .topbar-refresh-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 12px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      transition: all 0.2s var(--ease);
    }
    .topbar-refresh-btn:hover {
      background: var(--accent-dim);
      border-color: rgba(124,110,250,0.3);
      color: var(--accent);
    }

    /* ═══════════════════════════════════════════
       CONTENT SCROLL AREA
    ═══════════════════════════════════════════ */
    #content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 20px;
      scroll-behavior: smooth;
    }
    #content::-webkit-scrollbar { width: 4px; }
    #content::-webkit-scrollbar-track { background: transparent; }
    #content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

    /* ═══════════════════════════════════════════
       CARD SYSTEM — Double Bezel
    ═══════════════════════════════════════════ */
    .card {
      background: rgba(15,15,26,0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s var(--ease), box-shadow 0.3s var(--ease);
    }
    .card:hover {
      border-color: var(--border-hi);
      box-shadow: 0 0 24px rgba(124,110,250,0.06);
    }
    /* Inner bezel */
    .card::before {
      content: '';
      position: absolute;
      inset: 1px;
      border-radius: calc(var(--radius-lg) - 1px);
      border: 1px solid rgba(255,255,255,0.04);
      pointer-events: none;
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px 10px;
      border-bottom: 1px solid var(--border);
    }
    .card-title {
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }
    .card-body { padding: 16px 18px; }

    /* ═══════════════════════════════════════════
       BENTO GRID
    ═══════════════════════════════════════════ */
    .bento {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 14px;
    }
    .col-3  { grid-column: span 3; }
    .col-4  { grid-column: span 4; }
    .col-6  { grid-column: span 6; }
    .col-8  { grid-column: span 8; }
    .col-12 { grid-column: span 12; }

    .section-title {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ═══════════════════════════════════════════
       METRIC TILE
    ═══════════════════════════════════════════ */
    .metric-tile {
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .metric-label {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }
    .metric-value {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 600;
      line-height: 1;
      color: #fff;
      letter-spacing: -0.02em;
    }
    .metric-sub {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
    }
    .metric-delta {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .delta-up   { color: var(--green); background: var(--green-dim); }
    .delta-down { color: var(--red); background: var(--red-dim); }
    .delta-flat { color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.06); }

    /* ═══════════════════════════════════════════
       STATUS BADGE
    ═══════════════════════════════════════════ */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 99px;
    }
    .badge-green  { color: var(--green); background: var(--green-dim); border: 1px solid rgba(74,222,128,0.15); }
    .badge-red    { color: var(--red); background: var(--red-dim); border: 1px solid rgba(248,113,113,0.15); }
    .badge-yellow { color: var(--yellow); background: var(--yellow-dim); border: 1px solid rgba(250,204,21,0.15); }
    .badge-cyan   { color: var(--cyan); background: var(--cyan-dim); border: 1px solid rgba(34,211,238,0.15); }
    .badge-muted  { color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.05); border: 1px solid var(--border); }
    .badge-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

    /* ═══════════════════════════════════════════
       CONTAINER ROW
    ═══════════════════════════════════════════ */
    .container-list { display: flex; flex-direction: column; }
    .container-row {
      display: grid;
      grid-template-columns: 20px 1fr 90px 70px 70px 80px;
      align-items: center;
      gap: 12px;
      padding: 8px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      transition: background 0.15s var(--ease);
    }
    .container-row:last-child { border-bottom: none; }
    .container-row:hover { background: rgba(255,255,255,0.025); }
    .container-row-header {
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
      padding: 6px 18px;
    }
    .container-state-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .container-name {
      font-family: var(--font-mono);
      font-size: 11px;
      color: rgba(255,255,255,0.75);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .container-image {
      font-size: 10px;
      color: rgba(255,255,255,0.3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Progress mini bar */
    .mini-bar { width: 100%; height: 3px; background: rgba(255,255,255,0.06); border-radius: 99px; overflow: hidden; }
    .mini-bar-fill { height: 100%; border-radius: 99px; transition: width 0.5s var(--ease); }
    .bar-value { font-family: var(--font-mono); font-size: 10px; color: rgba(255,255,255,0.5); text-align: right; }

    /* ═══════════════════════════════════════════
       GAUGE ARC SVG
    ═══════════════════════════════════════════ */
    .gauge-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 16px 18px 12px;
    }
    .gauge-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }
    .gauge-svg { overflow: visible; }
    .gauge-value-text {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 600;
      fill: #fff;
      dominant-baseline: central;
      text-anchor: middle;
    }
    .gauge-unit-text {
      font-family: var(--font-mono);
      font-size: 10px;
      fill: rgba(255,255,255,0.35);
      dominant-baseline: central;
      text-anchor: middle;
    }

    /* ═══════════════════════════════════════════
       TIMELINE EVENTS
    ═══════════════════════════════════════════ */
    .event-feed { display: flex; flex-direction: column; gap: 0; }
    .event-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 9px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      transition: background 0.15s;
    }
    .event-row:hover { background: rgba(255,255,255,0.02); }
    .event-row:last-child { border-bottom: none; }
    .event-type-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 5px;
    }
    .event-msg {
      flex: 1;
      font-size: 12px;
      color: rgba(255,255,255,0.65);
      line-height: 1.4;
    }
    .event-time {
      font-family: var(--font-mono);
      font-size: 10px;
      color: rgba(255,255,255,0.25);
      flex-shrink: 0;
      padding-top: 2px;
    }

    /* ═══════════════════════════════════════════
       ALERT WALL — retractable right panel
    ═══════════════════════════════════════════ */
    #alert-wall {
      position: fixed;
      top: 0; right: 0;
      width: 320px;
      height: 100vh;
      background: rgba(8,8,16,0.92);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-left: 1px solid var(--border);
      z-index: 100;
      transform: translateX(100%);
      transition: transform 0.4s var(--ease);
      display: flex;
      flex-direction: column;
    }
    #alert-wall.open { transform: translateX(0); }
    .alert-wall-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }
    .alert-wall-title {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 600;
      color: #fff;
    }
    .alert-wall-close {
      width: 28px; height: 28px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      transition: all 0.2s;
    }
    .alert-wall-close:hover { background: rgba(255,255,255,0.06); color: #fff; }
    .alert-list { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
    .alert-item {
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .alert-item.crit { background: rgba(248,113,113,0.06); border-color: rgba(248,113,113,0.15); }
    .alert-item.warn { background: rgba(250,204,21,0.06); border-color: rgba(250,204,21,0.15); }
    .alert-item.info { background: rgba(34,211,238,0.06); border-color: rgba(34,211,238,0.12); }
    .alert-item-title { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.85); }
    .alert-item-msg { font-size: 11px; color: rgba(255,255,255,0.45); }
    .alert-item-time { font-family: var(--font-mono); font-size: 10px; color: rgba(255,255,255,0.25); }

    /* ═══════════════════════════════════════════
       SKELETON LOADER
    ═══════════════════════════════════════════ */
    .skeleton {
      background: linear-gradient(90deg,
        rgba(255,255,255,0.04) 25%,
        rgba(255,255,255,0.08) 50%,
        rgba(255,255,255,0.04) 75%
      );
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 6px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* ═══════════════════════════════════════════
       HEALTH STRIP
    ═══════════════════════════════════════════ */
    .health-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    .health-tile {
      background: rgba(15,15,26,0.6);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: border-color 0.2s;
    }
    .health-tile:hover { border-color: var(--border-hi); }
    .health-tile-icon { font-size: 18px; flex-shrink: 0; }
    .health-tile-info { flex: 1; min-width: 0; }
    .health-tile-label {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-bottom: 3px;
    }
    .health-tile-value {
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 600;
      color: #fff;
      line-height: 1;
    }

    /* ═══════════════════════════════════════════
       SCHEDULER JOBS
    ═══════════════════════════════════════════ */
    .job-row {
      display: grid;
      grid-template-columns: 1fr 80px 120px;
      align-items: center;
      gap: 12px;
      padding: 8px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }

<body>
<div id="app"></div>

<script type="module">
import { h, render, Fragment } from "https://esm.sh/preact@10";
import { useState, useEffect, useCallback, useRef } from "https://esm.sh/preact@10/hooks";
import htm from "https://esm.sh/htm@3";
const html = htm.bind(h);

// ═══════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════
async function api(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

function fmt(n, d=0) {
  if (n == null) return "—";
  return Number(n).toFixed(d);
}

function relTime(ts) {
  if (!ts) return "—";
  const diff = Date.now() - new Date(ts);
  if (diff < 60000) return "agora";
  if (diff < 3600000) return `${Math.floor(diff/60000)}m`;
  if (diff < 86400000) return `${Math.floor(diff/3600000)}h`;
  return `${Math.floor(diff/86400000)}d`;
}

function fmtBytes(mb) {
  if (mb == null) return "—";
  if (mb < 1024) return `${fmt(mb)}MB`;
  return `${fmt(mb/1024, 1)}GB`;
}

// ═══════════════════════════════════════════
// GAUGE ARC COMPONENT
// ═══════════════════════════════════════════
function GaugeArc({ value=0, max=100, color="#7C6EFA", size=120, label="" }) {
  const pct = Math.min(Math.max(value / max, 0), 1);
  const r = 46;
  const cx = 60, cy = 62;
  const startAngle = -210;  // degrees, from bottom-left
  const totalArc = 240;     // 240° sweep
  const angle = startAngle + totalArc * pct;

  function polarToXY(angleDeg, radius) {
    const rad = (angleDeg * Math.PI) / 180;
    return {
      x: cx + radius * Math.cos(rad),
      y: cy + radius * Math.sin(rad),
    };
  }

  function arcPath(startDeg, endDeg, r2) {
    const s = polarToXY(startDeg, r2);
    const e = polarToXY(endDeg, r2);
    const largeArc = (endDeg - startDeg) > 180 ? 1 : 0;
    return `M ${s.x} ${s.y} A ${r2} ${r2} 0 ${largeArc} 1 ${e.x} ${e.y}`;
  }

  const trackPath = arcPath(startAngle, startAngle + totalArc, r);
  const fillPath = arcPath(startAngle, pct > 0.001 ? angle : startAngle + 0.01, r);

  // Gradient id unique to this instance
  const gid = `g-${label.replace(/\s/g,'')}`;

  return html`
    <div class="gauge-wrap">
      <svg width=${size} height=${size} viewBox="0 0 120 120" class="gauge-svg">
        <defs>
          <linearGradient id=${gid} x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color=${color} stop-opacity="0.6"/>
            <stop offset="100%" stop-color=${color} stop-opacity="1"/>
          </linearGradient>
        </defs>
        <!-- Track -->
        <path d=${trackPath} fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="8" stroke-linecap="round"/>
        <!-- Fill -->
        <path d=${fillPath} fill="none" stroke=${"url(#" + gid + ")"} stroke-width="8" stroke-linecap="round"
              style=${{ filter: `drop-shadow(0 0 6px ${color}60)` }}/>
        <!-- Value -->
        <text x="60" y="58" class="gauge-value-text">${fmt(value, 0)}${max===100?'%':''}</text>
        ${max !== 100 && html`<text x="60" y="74" class="gauge-unit-text">${label}</text>`}
      </svg>
      <div class="gauge-label">${label}</div>
    </div>
  `;
}

// ═══════════════════════════════════════════
// METRIC TILE COMPONENT
// ═══════════════════════════════════════════
function MetricTile({ label, value, sub, delta, deltaDir }) {
  const cls = deltaDir === "up" ? "delta-up" : deltaDir === "down" ? "delta-down" : "delta-flat";
  const arrow = deltaDir === "up" ? "↑" : deltaDir === "down" ? "↓" : "→";
  return html`
    <div class="metric-tile">
      <div class="metric-label">${label}</div>
      <div class="metric-value">${value ?? "—"}</div>
      <div style=${{ display:"flex", alignItems:"center", gap:"8px", marginTop:"2px" }}>
        ${sub && html`<div class="metric-sub">${sub}</div>`}
        ${delta && html`<span class=${"metric-delta " + cls}>${arrow} ${delta}</span>`}
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════════
// STATUS ORB
// ═══════════════════════════════════════════
function StatusOrb({ state }) {
  const map = {
    running: { color: "#4ADE80", glow: "#4ADE8060" },
    healthy: { color: "#4ADE80", glow: "#4ADE8060" },
    up:      { color: "#4ADE80", glow: "#4ADE8060" },
    exited:  { color: "#F87171", glow: "#F8717160" },
    stopped: { color: "#F87171", glow: "#F8717160" },
    error:   { color: "#F87171", glow: "#F8717160" },
    paused:  { color: "#FACC15", glow: "#FACC1560" },
    restarting: { color: "#FB923C", glow: "#FB923C60" },
  };
  const s = map[(state||"").toLowerCase()] || { color: "rgba(255,255,255,0.2)", glow: "transparent" };
  return html`
    <div class="container-state-dot" style=${{
      background: s.color,
      boxShadow: `0 0 6px ${s.glow}`,
    }}/>
  `;
}

// ═══════════════════════════════════════════
// MINI BAR COMPONENT
// ═══════════════════════════════════════════
function MiniBar({ pct=0, color }) {
  const clr = pct > 85 ? "#F87171" : pct > 65 ? "#FACC15" : (color || "#7C6EFA");
  return html`
    <div>
      <div class="mini-bar">
        <div class="mini-bar-fill" style=${{ width: `${Math.min(pct,100)}%`, background: clr }}/>
      </div>
      <div class="bar-value">${fmt(pct,0)}%</div>
    </div>
  `;
}

// ═══════════════════════════════════════════
// ALERT WALL PANEL
// ═══════════════════════════════════════════
function AlertWall({ open, onClose, alerts }) {
  return html`
    <div id="alert-wall" class=${open ? "open" : ""}>
      <div class="alert-wall-header">
        <div class="alert-wall-title">⚡ Alertas</div>
        <button class="alert-wall-close" onClick=${onClose}>✕</button>
      </div>
      <div class="alert-list">
        ${alerts.length === 0
          ? html`<div class="empty-state"><div class="empty-icon">✅</div>Nenhum alerta ativo</div>`
          : alerts.map((a, i) => html`
            <div key=${i} class=${"alert-item " + (a.severity || "info")}>
              <div class="alert-item-title">${a.title || a.type || "Alerta"}</div>
              <div class="alert-item-msg">${a.message || a.details || "—"}</div>
              <div class="alert-item-time">${relTime(a.created_at || a.timestamp)}</div>
            </div>
          `)
        }
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════════
// CLOCK
// ═══════════════════════════════════════════
function Clock() {
  const [t, setT] = useState(new Date());
  useEffect(() => {
    const id = setInterval(() => setT(new Date()), 1000);
    return () => clearInterval(id);
  }, []);
  const pad = n => String(n).padStart(2,"0");
  return html`
    <span class="topbar-clock">
      ${pad(t.getHours())}:${pad(t.getMinutes())}:${pad(t.getSeconds())}
    </span>
  `;
}

// ═══════════════════════════════════════════
// ═══════ SCREENS ═══════════════════════════
// ═══════════════════════════════════════════

// ─────────────────── OVERVIEW ───────────────────
function ScreenOverview({ onAlertOpen }) {
  const [kpis,    setKpis]    = useState(null);
  const [docker,  setDocker]  = useState(null);
  const [jobs,    setJobs]    = useState(null);
  const [events,  setEvents]  = useState([]);
  const [loading, setLoading] = useState(true);
  const [err,     setErr]     = useState(null);

  const load = useCallback(async () => {
    setLoading(true); setErr(null);
    try {
      const [k, d, j, ev] = await Promise.allSettled([
        api("/api/kpis"),
        api("/api/server/docker/stats"),
        api("/api/scheduler/jobs"),
        api("/api/timeline?limit=12"),
      ]);
      if (k.status === "fulfilled")  setKpis(k.value);
      if (d.status === "fulfilled")  setDocker(d.value);
      if (j.status === "fulfilled")  setJobs(j.value);
      if (ev.status === "fulfilled") setEvents(ev.value.events || []);
    } catch(e) { setErr(e.message); }
    finally { setLoading(false); }
  }, []);

  useEffect(() => { load(); }, [load]);

  // Containers from docker stats
  const containers = docker?.containers || [];
  const running = containers.filter(c => (c.state||c.status||"").toLowerCase() === "running").length;
  const stopped = containers.filter(c => ["exited","stopped","dead"].includes((c.state||c.status||"").toLowerCase())).length;
  const topCpu  = [...containers].sort((a,b) => (b.cpu_pct||0)-(a.cpu_pct||0)).slice(0, 8);

  // Compute aggregate CPU / RAM
  const totalCpu = containers.reduce((s,c) => s + (c.cpu_pct||0), 0);
  const totalMem = containers.reduce((s,c) => s + (c.mem_mb||0), 0);

  return html`
    <div style=${{ display:"flex", flexDirection:"column", gap:"18px" }}>

      <!-- HEALTH STRIP -->
      <div class="health-strip">
        <div class="health-tile">
          <div class="health-tile-icon">🐳</div>
          <div class="health-tile-info">
            <div class="health-tile-label">Containers</div>
            <div class="health-tile-value" style=${{ color: running > 0 ? "#4ADE80" : "#fff" }}>
              ${loading ? html`<span class="skeleton" style=${{ width:"40px",height:"18px",display:"inline-block"}}/>` : running}
            </div>
          </div>
          <span class="badge badge-green"><span class="badge-dot"/>running</span>
        </div>

        <div class="health-tile">
          <div class="health-tile-icon">⚙️</div>
          <div class="health-tile-info">
            <div class="health-tile-label">CPU total</div>
            <div class="health-tile-value">
              ${loading ? html`<span class="skeleton" style=${{ width:"50px",height:"18px",display:"inline-block"}}/>` : `${fmt(totalCpu,1)}%`}
            </div>
          </div>
        </div>

        <div class="health-tile">
          <div class="health-tile-icon">💾</div>
          <div class="health-tile-info">
            <div class="health-tile-label">RAM uso</div>
            <div class="health-tile-value">
              ${loading ? html`<span class="skeleton" style=${{ width:"50px",height:"18px",display:"inline-block"}}/>` : fmtBytes(totalMem)}
            </div>
          </div>
        </div>

        <div class="health-tile">
          <div class="health-tile-icon">🕒</div>
          <div class="health-tile-info">
            <div class="health-tile-label">Jobs ativos</div>
            <div class="health-tile-value">
              ${loading ? html`<span class="skeleton" style=${{ width:"30px",height:"18px",display:"inline-block"}}/>` : (jobs?.jobs?.length || "—")}
            </div>
          </div>
          <span class="badge badge-cyan"><span class="badge-dot"/>cron</span>
        </div>
      </div>

      <!-- BENTO MAIN -->
      <div class="bento">

        <!-- GAUGES — CPU + RAM + DISK -->
        <div class="card col-4">
          <div class="card-header">
            <span class="card-title">Servidor srv1</span>
            <span class="badge badge-green"><span class="badge-dot"/>live</span>
          </div>
          <div style=${{ display:"flex", justifyContent:"space-around", flexWrap:"wrap" }}>
            ${loading ? [1,2,3].map(i => html`
              <div key=${i} style=${{ padding:"16px", display:"flex",flexDirection:"column",alignItems:"center",gap:"8px" }}>
                <div class="skeleton" style=${{ width:"80px",height:"80px",borderRadius:"50%"}}/>
                <div class="skeleton" style=${{ width:"40px",height:"10px"}}/>
              </div>
            `) : html`
              <${GaugeArc} value=${kpis?.cpu_pct ?? totalCpu ?? 0} color="#7C6EFA" size=110 label="CPU"/>
              <${GaugeArc} value=${kpis?.ram_pct ?? 0} color="#22D3EE" size=110 label="RAM"/>
              <${GaugeArc} value=${kpis?.disk_pct ?? 0} color="#4ADE80" size=110 label="DISK"/>
            `}
          </div>
        </div>

        <!-- CONTAINERS TOP CPU -->
        <div class="card col-8">
          <div class="card-header">
            <span class="card-title">Containers — Top CPU</span>
            <span class="text-mono" style=${{ fontSize:"11px", color:"rgba(255,255,255,0.3)" }}>
              ${containers.length} total · ${stopped} parados
            </span>
          </div>
          <div class="container-list">
            <div class="container-row container-row-header">
              <span></span><span>Nome</span><span>CPU</span><span>RAM</span><span>Status</span><span></span>
            </div>
            ${loading ? [1,2,3,4,5].map(i => html`
              <div key=${i} class="container-row">
                <div class="skeleton" style=${{ width:"8px",height:"8px",borderRadius:"50%"}}/>
                <div class="skeleton" style=${{ height:"12px",width:"70%"}}/>
                <div class="skeleton" style=${{ height:"12px"}}/>
                <div class="skeleton" style=${{ height:"12px"}}/>
                <div class="skeleton" style=${{ height:"12px"}}/>
                <div/>
              </div>
            `) : topCpu.length === 0 ? html`
              <div class="empty-state"><div class="empty-icon">🐳</div>Sem containers</div>
            ` : topCpu.map((c, i) => {
              const state = (c.state || c.status || "").toLowerCase();
              const name  = c.name || c.Names || "—";
              const cpuPct = c.cpu_pct || 0;
              const memMb  = c.mem_mb || 0;
              const memPct = c.mem_pct || 0;
              return html`
                <div key=${i} class="container-row">
                  <${StatusOrb} state=${state}/>
                  <div>
                    <div class="container-name">${name}</div>
                  </div>
                  <${MiniBar} pct=${cpuPct} color="#7C6EFA"/>
                  <${MiniBar} pct=${memPct} color="#22D3EE"/>
                  <span class=${"badge " + (state==="running"?"badge-green":state==="exited"?"badge-red":"badge-yellow")}>
                    <span class="badge-dot"/>${state}
                  </span>
                  <div/>
                </div>
              `;
            })}
          </div>
        </div>

        <!-- SCHEDULER JOBS -->
        <div class="card col-4">
          <div class="card-header">
            <span class="card-title">Scheduler Jobs</span>
            <span class="badge badge-cyan"><span class="badge-dot"/>ativo</span>
          </div>
          <div>
            ${loading ? [1,2,3,4].map(i => html`
              <div key=${i} class="job-row">
                <div class="skeleton" style=${{ height:"12px",width:"80%"}}/>
                <div class="skeleton" style=${{ height:"12px"}}/>
                <div class="skeleton" style=${{ height:"12px"}}/>
              </div>
            `) : (jobs?.jobs || []).length === 0 ? html`
              <div class="empty-state"><div class="empty-icon">⏰</div>Nenhum job</div>
            ` : (jobs?.jobs || []).map((j, i) => {
              const next = j.next_run ? relTime(j.next_run) : "—";
              return html`
                <div key=${i} class="job-row">
                  <div>
                    <div class="job-name">${j.id || j.name || "job"}</div>
                    <div class="job-interval">${j.trigger || j.interval || ""}</div>
                  </div>
                  <span class="badge badge-green"><span class="badge-dot"/>ok</span>
                  <div class="job-next">→ ${next}</div>
                </div>
              `;
            })}
          </div>
        </div>

        <!-- TIMELINE EVENTS -->
        <div class="card col-8">
          <div class="card-header">
            <span class="card-title">Eventos Recentes</span>
            <button class="topbar-refresh-btn" style=${{ height:"26px" }} onClick=${load}>↻ Refresh</button>
          </div>
          <div class="event-feed">
            ${loading ? [1,2,3,4,5].map(i => html`
              <div key=${i} class="event-row">
                <div class="skeleton" style=${{ width:"6px",height:"6px",borderRadius:"50%",flexShrink:0,marginTop:"5px"}}/>

                <div class="skeleton" style=${{ height:"12px",width:"30px"}}/>
              </div>
            `) : events.length === 0 ? html`
              <div class="empty-state"><div class="empty-icon">📭</div>Sem eventos</div>
            ` : events.map((ev, i) => {
              const typeColor = {
                deploy: "#7C6EFA",
                alert:  "#F87171",
                cron:   "#22D3EE",
                error:  "#F87171",
                info:   "#4ADE80",
              }[ev.type?.toLowerCase()] || "rgba(255,255,255,0.3)";
              return html`
                <div key=${i} class="event-row">
                  <div class="event-type-dot" style=${{ background: typeColor, boxShadow: `0 0 5px ${typeColor}60` }}/>
                  <div class="event-msg">${ev.message || ev.description || JSON.stringify(ev)}</div>
                  <div class="event-time">${relTime(ev.created_at || ev.timestamp)}</div>
                </div>
              `;
            })}
          </div>
        </div>

      </div><!-- /bento -->
    </div>
  `;
}

// ─────────────────── INFRA (srv1) ───────────────────
function ScreenInfra() {
  const [data,    setData]    = useState(null);
  const [docker,  setDocker]  = useState(null);
  const [loading, setLoading] = useState(true);
  const [restartMsg, setRestartMsg] = useState(null);

  const load = useCallback(async () => {
    setLoading(true);
    const [s, d] = await Promise.allSettled([
      api("/api/kpis"),
      api("/api/server/docker/stats"),
    ]);
    if (s.status === "fulfilled") setData(s.value);
    if (d.status === "fulfilled") setDocker(d.value);
    setLoading(false);
  }, []);

  useEffect(() => { load(); }, [load]);

  const containers = docker?.containers || [];
  const running = containers.filter(c => (c.state||"").toLowerCase() === "running");
  const stopped = containers.filter(c => ["exited","stopped","dead"].includes((c.state||"").toLowerCase()));

  return html`
    <div style=${{ display:"flex", flexDirection:"column", gap:"18px" }}>

      <div class="section-title">Servidor Principal — srv1 (62.72.63.18)</div>

      <!-- GAUGES ROW -->
      <div class="bento">
        <div class="card col-4">
          <div class="card-header"><span class="card-title">Métricas Sistema</span></div>
          <div style=${{ display:"flex", justifyContent:"space-around" }}>
            <${GaugeArc} value=${data?.cpu_pct ?? 0} color="#7C6EFA" size=110 label="CPU"/>
            <${GaugeArc} value=${data?.ram_pct ?? 0} color="#22D3EE" size=110 label="RAM"/>
            <${GaugeArc} value=${data?.disk_pct ?? 0} color="#4ADE80" size=110 label="DISK"/>
          </div>
        </div>

        <div class="card col-4">
          <div class="card-header"><span class="card-title">Resumo Docker</span></div>
          <div class="card-body" style=${{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"12px" }}>
            <${MetricTile} label="Total" value=${containers.length} sub="containers"/>
            <${MetricTile} label="Running" value=${running.length} sub="ativos" deltaDir="up"/>
            <${MetricTile} label="Stopped" value=${stopped.length} sub="parados" deltaDir=${stopped.length > 0 ? "down" : "flat"}/>
            <${MetricTile} label="Uptime" value=${data?.uptime_hours ? `${data.uptime_hours}h` : "—"} sub="servidor"/>
          </div>
        </div>

        <div class="card col-4">
          <div class="card-header"><span class="card-title">Volumes & Redes</span></div>
          <div class="card-body" style=${{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"12px" }}>
            <${MetricTile} label="Volumes" value=${docker?.volumes_count ?? "—"}/>
            <${MetricTile} label="Redes" value=${docker?.networks_count ?? "—"}/>
            <${MetricTile} label="Imagens" value=${docker?.images_count ?? "—"}/>
            <${MetricTile} label="RAM total" value=${data?.ram_total_gb ? `${data.ram_total_gb}GB` : "—"}/>
          </div>
        </div>
      </div>

      <!-- ALL CONTAINERS -->
      <div class="card col-12">
        <div class="card-header">
          <span class="card-title">Todos os Containers</span>
          <span class="text-mono" style=${{ fontSize:"11px", color:"rgba(255,255,255,0.3)" }}>
            ${containers.length} total
          </span>
        </div>
        <div class="container-list">
          <div class="container-row container-row-header">
            <span></span><span>Nome</span><span>CPU</span><span>RAM</span><span>Status</span><span>Porta</span>
          </div>
          ${loading ? [1,2,3,4,5,6,7,8].map(i => html`
            <div key=${i} class="container-row">
              <div class="skeleton" style=${{ width:"8px",height:"8px",borderRadius:"50%"}}/>
              <div class="skeleton" style=${{ height:"12px",width:"75%"}}/>
              <div class="skeleton" style=${{ height:"12px"}}/>
              <div class="skeleton" style=${{ height:"12px"}}/>
              <div class="skeleton" style=${{ height:"12px"}}/>
              <div/>
            </div>
          `) : containers.map((c, i) => {
            const state  = (c.state || c.status || "").toLowerCase();
            const cpuPct = c.cpu_pct || 0;
            const memPct = c.mem_pct || 0;
            const port   = c.ports || "—";
            return html`
              <div key=${i} class="container-row">
                <${StatusOrb} state=${state}/>
                <div class="container-name">${c.name || "—"}</div>
                <${MiniBar} pct=${cpuPct} color="#7C6EFA"/>
                <${MiniBar} pct=${memPct} color="#22D3EE"/>
                <span class=${"badge " + (state==="running"?"badge-green":state==="exited"?"badge-red":"badge-yellow")}>
                  <span class="badge-dot"/>${state}
                </span>
                <div style=${{ fontFamily:"var(--font-mono)", fontSize:"10px", color:"rgba(255,255,255,0.3)" }}>${port}</div>
              </div>
            `;
          })}
        </div>
      </div>

    </div>
  `;
}

// ─────────────────── VAULT ───────────────────
function ScreenVault() {
  const [params,  setParams]  = useState([]);
  const [loading, setLoading] = useState(true);
  const [error,   setError]   = useState(null);
  const [reveal,  setReveal]  = useState({});

  const load = useCallback(async () => {
    setLoading(true); setError(null);
    try {
      const d = await api("/api/vault/params");
      setParams(d.params || []);
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  }, []);

  useEffect(() => { load(); }, [load]);

  const grouped = params.reduce((acc, p) => {
    const parts = (p.name || "").split("/").filter(Boolean);
    const prefix = parts.length > 0 ? `/${parts[0]}` : "/";
    if (!acc[prefix]) acc[prefix] = [];
    acc[prefix].push(p);
    return acc;
  }, {});

  return html`
    <div style=${{ display:"flex", flexDirection:"column", gap:"18px" }}>
      <div class="section-title">Vault SSM — AWS Parameter Store</div>

      <div style=${{
        display:"flex", alignItems:"center", gap:"10px",
        padding:"10px 14px",
        background:"rgba(250,204,21,0.06)",
        border:"1px solid rgba(250,204,21,0.15)",
        borderRadius:"8px",
        fontSize:"12px",
        color:"var(--yellow)",
      }}>
        🔒 Valores sensíveis mascarados. Clique em Revelar para ver — ação é logada.
        <button class="topbar-refresh-btn" style=${{ marginLeft:"auto" }} onClick=${load}>↻ Atualizar</button>
      </div>

      ${error && html`<div class="error-banner">⚠️ ${error}</div>`}

      ${loading
        ? [1,2].map(i => html`<div key=${i} class="skeleton" style=${{ height:"120px", borderRadius:"12px"}}/>`)
        : params.length === 0 && !error
        ? html`<div class="empty-state"><div class="empty-icon">🔐</div>Nenhum parâmetro SSM encontrado</div>`
        : Object.entries(grouped).map(([prefix, items]) => html`
          <div key=${prefix} class="card">
            <div class="card-header">
              <span class="card-title" style=${{ fontFamily:"var(--font-mono)" }}>${prefix}</span>
              <span class="badge badge-muted">${items.length} params</span>
            </div>
            <div style=${{ overflowX:"auto" }}>
              <table style=${{ width:"100%", borderCollapse:"collapse" }}>
                <thead>
                  <tr>
                    ${["Parâmetro","Tipo","Valor","Modificado",""].map(h => html`
                      <th key=${h} style=${{
                        padding:"6px 18px",
                        textAlign:"left",
                        fontFamily:"var(--font-mono)",
                        fontSize:"9px",
                        letterSpacing:"0.1em",
                        textTransform:"uppercase",
                        color:"rgba(255,255,255,0.25)",
                        borderBottom:"1px solid rgba(255,255,255,0.05)",
                      }}>${h}</th>
                    `)}
                  </tr>
                </thead>
                <tbody>
                  ${items.map((p, i) => {
                    const revealed = reveal[p.name];
                    const key = p.name?.split("/").pop();
                    return html`
                      <tr key=${i} style=${{ borderBottom:"1px solid rgba(255,255,255,0.03)" }}>
                        <td style=${{ padding:"8px 18px", fontFamily:"var(--font-mono)", fontSize:"11px", color:"var(--cyan)" }}>${key}</td>
                        <td style=${{ padding:"8px 18px" }}>
                          <span class=${"badge " + (p.type==="SecureString"?"badge-cyan":"badge-muted")}>${p.type || "String"}</span>
                        </td>
                        <td style=${{ padding:"8px 18px", fontFamily:"var(--font-mono)", fontSize:"11px",
                          color: revealed ? "var(--green)" : "rgba(255,255,255,0.25)",
                          letterSpacing: revealed ? "normal" : "0.2em",
                        }}>
                          ${revealed ? (p.value || "—") : "••••••••"}
                        </td>
                        <td style=${{ padding:"8px 18px", fontSize:"11px", color:"rgba(255,255,255,0.3)" }}>
                          ${p.last_modified ? new Date(p.last_modified).toLocaleDateString("pt-BR") : "—"}
                        </td>
                        <td style=${{ padding:"8px 18px" }}>
                          <button
                            class=${"topbar-refresh-btn"}
                            style=${{ height:"24px", padding:"0 10px", color: revealed ? "var(--red)" : undefined }}
                            onClick=${() => setReveal(r => ({ ...r, [p.name]: !r[p.name] }))}
                          >${revealed ? "Ocultar" : "Revelar"}</button>
                        </td>
                      </tr>
                    `;
                  })}
                </tbody>
              </table>
            </div>
          </div>
        `)
      }
    </div>
  `;
}

// ─────────────────── TIMELINE ───────────────────
function ScreenTimeline() {
  const [events,  setEvents]  = useState([]);
  const [loading, setLoading] = useState(true);
  const [filter,  setFilter]  = useState("all");

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const d = await api("/api/timeline?limit=50");
      setEvents(d.events || []);
    } catch(e) {}
    finally { setLoading(false); }
  }, []);

  useEffect(() => { load(); }, [load]);

  const types = ["all", ...new Set(events.map(e => e.type).filter(Boolean))];
  const filtered = filter === "all" ? events : events.filter(e => e.type === filter);

  return html`
    <div style=${{ display:"flex", flexDirection:"column", gap:"14px" }}>
      <div style=${{ display:"flex", alignItems:"center", gap:"10px", flexWrap:"wrap" }}>
        <div class="section-title" style=${{ marginBottom:0, flex:1 }}>Feed de Eventos</div>
        ${types.map(t => html`
          <button key=${t}
            onClick=${() => setFilter(t)}
            class=${"topbar-refresh-btn"}
            style=${{ height:"28px", color: filter===t ? "var(--accent)" : undefined,
              borderColor: filter===t ? "rgba(124,110,250,0.4)" : undefined,
              background: filter===t ? "var(--accent-dim)" : undefined,
            }}
          >${t}</button>
        `)}
        <button class="topbar-refresh-btn" onClick=${load} style=${{ height:"28px" }}>↻</button>
      </div>

      <div class="card">
        <div class="event-feed">
          ${loading ? [1,2,3,4,5,6,7,8].map(i => html`
            <div key=${i} class="event-row">
              <div class="skeleton" style=${{ width:"6px",height:"6px",borderRadius:"50%",flexShrink:0,marginTop:"5px"}}/>
              <div class="skeleton" style=${{ height:"12px",flex:1}}/>
              <div class="skeleton" style=${{ height:"12px",width:"30px"}}/>
            </div>
          `) : filtered.length === 0 ? html`
            <div class="empty-state"><div class="empty-icon">📭</div>Nenhum evento</div>
          ` : filtered.map((ev, i) => {
            const typeColor = {
              deploy: "#7C6EFA",
              alert:  "#F87171",
              cron:   "#22D3EE",
              error:  "#F87171",
              info:   "#4ADE80",
            }[ev.type?.toLowerCase()] || "rgba(255,255,255,0.3)";
            return html`
              <div key=${i} class="event-row">
                <div class="event-type-dot" style=${{ background: typeColor, boxShadow: `0 0 5px ${typeColor}60` }}/>
                <div>
                  <div class="event-msg">${ev.message || ev.description || "—"}</div>
                  ${ev.type && html`<div style=${{ fontFamily:"var(--font-mono)",fontSize:"9px",color:"rgba(255,255,255,0.25)",marginTop:"2px" }}>${ev.type}</div>`}
                </div>
                <div class="event-time">${relTime(ev.created_at || ev.timestamp)}</div>
              </div>
            `;
          })}
        </div>
      </div>
    </div>
  `;
}

// ─────────────────── ALERTS ───────────────────
function ScreenAlerts() {
  const [alerts, setAlerts] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    api("/api/alerts").then(d => setAlerts(d.alerts || [])).finally(() => setLoading(false));
  }, []);

  return html`
    <div style=${{ display:"flex", flexDirection:"column", gap:"14px" }}>
      <div class="section-title">Log de Alertas</div>
      <div class="card">
        ${loading ? [1,2,3].map(i => html`
          <div key=${i} style=${{ padding:"12px 18px", borderBottom:"1px solid rgba(255,255,255,0.04)" }}>
            <div class="skeleton" style=${{ height:"12px", width:"80%", marginBottom:"6px"}}/>
            <div class="skeleton" style=${{ height:"10px", width:"50%"}}/>
          </div>
        `) : alerts.length === 0 ? html`
          <div class="empty-state"><div class="empty-icon">✅</div>Nenhum alerta registrado</div>
        ` : alerts.map((a, i) => html`
          <div key=${i} class="event-row">
            <div class="event-type-dot" style=${{ background:"var(--red)", marginTop:"5px" }}/>
            <div>
              <div class="event-msg">${a.message || a.type || "—"}</div>
              <div style=${{ fontFamily:"var(--font-mono)",fontSize:"9px",color:"rgba(255,255,255,0.25)",marginTop:"2px" }}>
                ${a.channel || a.type} · ${a.status || "sent"}
              </div>
            </div>
            <div class="event-time">${relTime(a.created_at)}</div>
          </div>
        `)}
      </div>
    </div>
  `;
}

// ─────────────────── SCANNER ───────────────────
function ScreenScanner() {
  const [result, setResult] = useState(null);
  const [running, setRunning] = useState(false);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    api("/api/scanner/last").then(d => setResult(d)).finally(() => setLoading(false));
  }, []);

  const runScan = async () => {
    setRunning(true);
    try {
      const d = await api("/api/scanner/run");
      setResult(d);
    } finally { setRunning(false); }
  };

  const findings = result?.findings || result?.results || [];

  return html`
    <div style=${{ display:"flex", flexDirection:"column", gap:"14px" }}>
      <div style=${{ display:"flex", alignItems:"center", gap:"10px" }}>
        <div class="section-title" style=${{ marginBottom:0, flex:1 }}>Resource Scanner</div>
        <button class="topbar-refresh-btn" style=${{ height:"30px" }} onClick=${runScan} disabled=${running}>
          ${running ? html`<span class="spin">↻</span> Rodando...` : "▶ Escanear"}
        </button>
      </div>

      ${loading
        ? html`<div class="skeleton" style=${{ height:"200px", borderRadius:"12px"}}/>`
        : html`
          <div class="card">
            ${findings.length === 0
              ? html`<div class="empty-state"><div class="empty-icon">🔍</div>Nenhum resultado. Rode um scan.</div>`
              : findings.map((f, i) => html`
                <div key=${i} class="event-row">
                  <div class="event-type-dot" style=${{
                    background: f.severity === "high" ? "var(--red)" : f.severity === "medium" ? "var(--yellow)" : "var(--cyan)",
                    marginTop:"5px"
                  }}/>
                  <div>
                    <div class="event-msg">${f.message || f.description || JSON.stringify(f)}</div>
                    ${f.category && html`<div style=${{ fontFamily:"var(--font-mono)",fontSize:"9px",color:"rgba(255,255,255,0.25)",marginTop:"2px" }}>${f.category}</div>`}
                  </div>
                  <span class=${"badge " + (f.severity==="high"?"badge-red":f.severity==="medium"?"badge-yellow":"badge-cyan")}>
                    ${f.severity || "info"}
                  </span>
                </div>
              `)
            }
          </div>
        `
      }
    </div>
  `;
}

// ═══════════════════════════════════════════
// NAV CONFIG
// ═══════════════════════════════════════════
const NAV = [
  { id: "overview",  icon: "⬡", label: "Overview",  section: "MAIN" },
  { id: "infra",     icon: "🖥", label: "Infra srv1", section: "MAIN" },
  { id: "vault",     icon: "🔐", label: "Vault SSM",  section: "MAIN" },
  { id: "timeline",  icon: "📡", label: "Timeline",   section: "OPS"  },
  { id: "alerts",    icon: "⚡", label: "Alertas",    section: "OPS"  },
  { id: "scanner",   icon: "🔍", label: "Scanner",    section: "OPS"  },
];

const SCREEN_TITLES = {
  overview: "Mission Control",
  infra:    "Infraestrutura — srv1",
  vault:    "Vault SSM",
  timeline: "Timeline",
  alerts:   "Alertas",
  scanner:  "Resource Scanner",
};

// ═══════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════
function App() {
  const [route,       setRoute]       = useState("overview");
  const [alertWall,   setAlertWall]   = useState(false);
  const [alertCount,  setAlertCount]  = useState(0);
  const [alerts,      setAlerts]      = useState([]);
  const [mobileSidebar, setMobileSidebar] = useState(false);

  // Load alert count on mount
  useEffect(() => {
    api("/api/alerts?limit=20")
      .then(d => {
        const al = d.alerts || [];
        setAlerts(al);
        setAlertCount(al.filter(a => !a.acknowledged).length || al.length);
      })
      .catch(() => {});
  }, []);

  // Keyboard shortcut: Cmd+K → focus nav
  useEffect(() => {
    const handler = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === "k") {
        e.preventDefault();
        setMobileSidebar(v => !v);
      }
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, []);

  // Render current screen
  function renderScreen() {
    switch(route) {
      case "overview":  return html`<${ScreenOverview} onAlertOpen=${() => setAlertWall(true)}/>`;
      case "infra":     return html`<${ScreenInfra}/>`;
      case "vault":     return html`<${ScreenVault}/>`;
      case "timeline":  return html`<${ScreenTimeline}/>`;
      case "alerts":    return html`<${ScreenAlerts}/>`;
      case "scanner":   return html`<${ScreenScanner}/>`;
      default:          return html`<${ScreenOverview}/>`;
    }
  }

  const sections = [...new Set(NAV.map(n => n.section))];

  return html`
    <${Fragment}>
      <!-- Sidebar overlay on mobile -->
      ${mobileSidebar && html`
        <div
          style=${{ position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:49 }}
          onClick=${() => setMobileSidebar(false)}
        />
      `}

      <!-- SIDEBAR -->
      <nav id="sidebar" class=${mobileSidebar ? "open" : ""}>
        <div class="sidebar-logo">
          <div class="sidebar-logo-icon">⬡</div>
          <div class="sidebar-logo-text">Controler</div>
          <div class="sidebar-logo-tag">NOC</div>
        </div>

        ${sections.map(sec => html`
          <div key=${sec} class="sidebar-section">
            <div class="sidebar-section-label">${sec}</div>
            ${NAV.filter(n => n.section === sec).map(n => html`
              <div
                key=${n.id}
                class=${"nav-item " + (route === n.id ? "active" : "")}
                onClick=${() => { setRoute(n.id); setMobileSidebar(false); }}
              >
                <span class="nav-icon">${n.icon}</span>
                ${n.label}
              </div>
            `)}
          </div>
        `)}

        <div class="sidebar-footer">
          <div class="status-pill">
            <div class="status-dot"/>
            controler.net.br
          </div>
        </div>
      </nav>

      <!-- MAIN -->
      <div id="main">
        <!-- TOPBAR -->
        <header id="topbar">
          <button
            class="topbar-btn"
            style=${{ display:"none" }}
            id="mobile-menu-btn"
            onClick=${() => setMobileSidebar(v => !v)}
          >☰</button>

          <div class="topbar-title">${SCREEN_TITLES[route] || "Controler NOC"}</div>

          <${Clock}/>

          <span class="version-tag">v4.0</span>

          <button class="topbar-btn" onClick=${() => setAlertWall(v => !v)}>
            ⚡
            ${alertCount > 0 && html`<div class="alert-badge"/>`}
          </button>

          <button class="topbar-btn" onClick=${() => window.location.reload()}>↻</button>
        </header>

        <!-- CONTENT -->
        <div id="content">
          ${renderScreen()}
        </div>
      </div>

      <!-- ALERT WALL -->
      <${AlertWall}
        open=${alertWall}
        onClose=${() => setAlertWall(false)}
        alerts=${alerts}
      />
    </${Fragment}>
  `;
}

// ═══════════════════════════════════════════
// MOUNT
// ═══════════════════════════════════════════
render(html`<${App}/>`, document.getElementById("app"));
</script>
</body>
</html>
