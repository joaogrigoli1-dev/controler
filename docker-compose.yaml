services:
  controler:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /opt/openclaw/cron:/opt/openclaw/cron:ro
      - /opt/openclaw/config.yml:/opt/openclaw/config.yml:ro
    environment:
      - HOST=0.0.0.0
      - PORT=3001
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
