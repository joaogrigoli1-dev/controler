version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: controler
      POSTGRES_USER: controler
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-controler}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U controler -d controler"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://controler:${POSTGRES_PASSWORD:-controler}@postgres:5432/controler
      REDIS_URL: redis://redis:6379
      PORT: 4000
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      HOSTINGER_API_TOKEN: ${HOSTINGER_API_TOKEN}
      COOLIFY_BASE_URL: ${COOLIFY_BASE_URL}
      COOLIFY_TOKEN: ${COOLIFY_TOKEN}
      SRV1_SSH_HOST: ${SRV1_SSH_HOST:-62.72.63.18}
      SRV1_SSH_USER: ${SRV1_SSH_USER:-root}
      ZAPI_INSTANCE_ID: ${ZAPI_INSTANCE_ID}
      ZAPI_TOKEN: ${ZAPI_TOKEN}
      ZAPI_CLIENT_TOKEN: ${ZAPI_CLIENT_TOKEN}
      INFOBIP_API_KEY: ${INFOBIP_API_KEY}
      ALERT_PHONE_DEFAULT: ${ALERT_PHONE_DEFAULT:-556598466555}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./ssh:/root/.ssh:ro
    expose:
      - "4000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-http://api:4000}
      NEXT_PUBLIC_WS_URL: ${PUBLIC_WS_URL:-ws://api:4000}
      API_INTERNAL_URL: http://api:4000
    expose:
      - "3000"

volumes:
  postgres-data:
  redis-data:
